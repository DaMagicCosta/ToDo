<title>ToDo</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; background:#0f1117; color:#e6e9ef; }
  header { padding:20px 24px 8px; }
  header h1 { margin:0; font-size:20px; }
  footer { position:fixed; bottom:0; left:0; right:0; padding:8px 24px; font-size:11px; color:#6b7280; background:#0f1117; border-top:1px solid #232733; }
  .gate { max-width:320px; margin:18vh auto 0; padding:0 24px; text-align:center; }
  .gate h1 { font-size:22px; margin:0 0 16px; }
  .gate input { width:100%; padding:10px 12px; font-size:16px; border-radius:8px; border:1px solid #232733; background:#161922; color:#e6e9ef; }
  .gate button { margin-top:10px; width:100%; padding:10px; border:0; border-radius:8px; background:#2dd4bf; color:#06231f; font-weight:600; cursor:pointer; }
  .gate .err { color:#f87171; font-size:13px; margin-top:10px; min-height:18px; }
  #app { display:none; }
</style>
</head>
<body>
<div class="gate" id="gate">
  <h1>&#128274; ToDo</h1>
  <input id="pin" type="password" placeholder="PIN" autofocus>
  <button onclick="unlock()">Entsperren</button>
  <div class="err" id="err"></div>
</div>
<div id="app">

</div>

function b64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function switchTab(el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(el.dataset.pane).classList.add('active');
}
async function unlock(){
  const pin = document.getElementById('pin').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(PAYLOAD.iv) }, key, b64(PAYLOAD.ct));
    document.getElementById('content').innerHTML = new TextDecoder().decode(pt);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (e) {
    err.textContent = 'Falsche PIN';
  }
}
document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
