<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1117">
<script>(function(){try{var t=localStorage.getItem('theme');
if(!t)t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='dark';}})();</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ToDo</title>
<style>
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#0f1117; --surface:#161922; --surface-deep:#11141b; --surface-sub:#13161d;
    --surface-elevated:#1f2937; --overlay:rgba(0,0,0,.55); --shadow:rgba(0,0,0,.5);
    --border:#232733; --border-subtle:#2d333f;
    --text:#e6e9ef; --text-muted:#9aa4b2; --text-dim:#a3acba; --text-dim2:#8b93a1;
    --text-subtle:#7aa2a9; --text-soft:#cdd3df;
    --accent:#2dd4bf; --accent-ink:#06231f; --link:#7dd3fc;
    --danger:#f87171; --done:#4ade80;
    --prio-hi-bg:#3b1d1d; --prio-mid:#fbbf24; --prio-mid-bg:#3a2f17;
    --prio-lo:#5eead4; --prio-lo-bg:#1d2c2b; --overdue-bg:#251417; --sixt-bg:#1c1a12;
    --search-hi-bg:#3b3a16; --search-hi-text:#fde68a; --toast-bg:#232733; --toast-text:#e6e9ef;
  }
  html[data-theme="light"]{
    color-scheme: light;
    --bg:#f6f7f9; --surface:#ffffff; --surface-deep:#eef0f3; --surface-sub:#f0f2f5;
    --surface-elevated:#eceef2; --overlay:rgba(0,0,0,.45); --shadow:rgba(0,0,0,.18);
    --border:#e2e5ea; --border-subtle:#d7dbe1;
    --text:#1b1f27; --text-muted:#4b5563; --text-dim:#5b6472; --text-dim2:#6b7280;
    --text-subtle:#4b7a82; --text-soft:#3a4150;
    --accent:#0d9488; --accent-ink:#ffffff; --link:#0369a1;
    --danger:#dc2626; --done:#16a34a;
    --prio-hi-bg:#fde8e8; --prio-mid:#b45309; --prio-mid-bg:#fdf0dd;
    --prio-lo:#0d9488; --prio-lo-bg:#d9f2ee; --overdue-bg:#fdecec; --sixt-bg:#fdf6e3;
    --search-hi-bg:#fde68a; --search-hi-text:#713f12; --toast-bg:#2b303b; --toast-text:#f6f7f9;
  }
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  #updbar { position:fixed; left:0; right:0; bottom:0; z-index:200; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 16px; background:var(--bg); border-top:1px solid var(--accent); font-size:13px; color:var(--text); }
  #updbar button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:8px; padding:6px 14px; font-weight:600; cursor:pointer; }
  header { padding:16px 24px 6px; }
  header h1 { margin:0; font-size:18px; }
  .gate { max-width:320px; margin:18vh auto 0; padding:0 24px; text-align:center; }
  .gate h1 { font-size:22px; margin:0 0 16px; }
  .gate input { width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); }
  .gate button[type="submit"] { margin-top:10px; width:100%; padding:11px; border:0; border-radius:8px; background:var(--accent); color:var(--accent-ink); font-weight:600; cursor:pointer; }
  .gate .err { color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }
  .gate form { margin:0; }
  .pinwrap { position:relative; }
  #pin { padding-right:44px; }
  .reveal { position:absolute; right:4px; top:50%; transform:translateY(-50%); width:auto; margin:0; padding:9px 12px; line-height:1; background:transparent; border:0; color:var(--text-muted); font-size:18px; cursor:pointer; }
  .ic { width:1em; height:1em; display:inline-block; vertical-align:-0.15em; } /* Zwilling in render.py _FRAGMENT_CSS */
  .gate input.userhide { position:absolute; width:1px; height:1px; padding:0; margin:-1px; border:0; opacity:0; pointer-events:none; }
  #app { display:none; }
  html, body { overscroll-behavior-y: contain; }
  #pull { height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:13px; transition:height .12s ease; }
  .toolbar { position:fixed; bottom:0; left:0; right:0; display:flex; gap:8px; padding:10px 16px; background:var(--bg); border-top:1px solid var(--border); }
  .toolbar button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; }
  .btn-refresh { background:var(--surface-elevated); color:var(--text); }
  .btn-copy { background:var(--accent); color:var(--accent-ink); }
  #toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:var(--toast-bg); color:var(--toast-text); padding:8px 14px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; }
  #toast.show { opacity:1; }
  #fallback { display:none; padding:12px 16px; }
  #fallback textarea { width:100%; height:120px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:8px; }
  #editor { display:none; position:fixed; inset:0; background:var(--overlay); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .ed-box h3 { margin:0 0 10px; font-size:16px; }
  .ed-lab { display:block; font-size:11px; color:var(--text-muted); margin:10px 0 4px; }
  .ed-box input[type=text], .ed-box input[type=date], .ed-box input[type=time] { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  .ed-row input[type=date], .ed-row input[type=time] { width:auto; flex:1; min-width:0; }
  .ed-box textarea { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); resize:vertical; font-family:inherit; }
  #ed-note, #nw-note { min-height:100px; }
  #ed-prio { display:flex; gap:6px; }
  #ed-prio .pbtn { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; }
  #ed-prio .pbtn.sel { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  .ed-row { display:flex; gap:6px; align-items:center; }
  .ed-row button { padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); }
  .ed-actions { display:flex; gap:8px; margin-top:14px; }
  .ed-actions button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; }
  .ed-cancel { background:var(--surface-elevated); color:var(--text); }
  .ed-ok { background:var(--accent); color:var(--accent-ink); }
  .ed-box-note { max-height:88vh; overflow:auto; }
  #nt-note { min-height:160px; }
  .ed-box textarea.mdfield { max-height:50vh; resize:none; }
  .mdbar { display:flex; gap:6px; margin-bottom:8px; }
  .mdbar button { flex:1; padding:9px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; cursor:pointer; }
  .mdbar button:active { background:var(--surface-elevated); }
  .mdbar button.active { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  div.mdprev { margin:0; min-height:40px; }
  .mdprev-empty { color:var(--text-dim2); }
  div.mdfield { min-height:100px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--surface-deep); line-height:1.4; overflow:auto; }
  div.mdfield ul { margin:4px 0; padding-left:20px; }
  div.mdfield h1, div.mdfield h2, div.mdfield h3 { margin:6px 0 2px; }
  .wb-termin { display:flex; gap:6px; margin-bottom:8px; }
  .wb-title { flex:1; min-width:0; padding:9px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:14px; box-sizing:border-box; }
  .wb-termin button { padding:9px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); cursor:pointer; white-space:nowrap; }
  .wb-field { width:100%; box-sizing:border-box; background:var(--surface-deep); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  #wb-note, #wb-note-fb { min-height:42vh; }   /* ID-Selektor schlaegt div.mdfield{min-height:100px} */
  body.wbfull #searchbar { display:none; }
  @media (max-width:899px){ #wb-note, #wb-note-fb { min-height:70vh; } }
  .wb-actions { margin:8px 0; }
  .wb-actions button { width:100%; padding:9px 0; border:1px solid var(--accent); border-radius:8px; background:var(--bg); color:var(--accent); font-size:13px; cursor:pointer; }
  .wb-actions button:active { background:var(--accent-ink); }
  #filterbar { display:flex; align-items:center; gap:8px; padding:8px 16px 0; }
  #searchbar { padding:8px 16px 0; }
  .pcstatus { padding:6px 16px; font-size:12px; color:var(--text-muted); }
  .pcstatus.offline { color:var(--danger); font-weight:600; }
  #q { width:100%; padding:8px 10px; font-size:14px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  .nomatch { display:none !important; }
  mark.shl { background:var(--search-hi-bg); color:var(--search-hi-text); border-radius:2px; padding:0 1px; }
  #content [data-id] { cursor:pointer; }
  #ed-subs { display:flex; flex-direction:column; gap:3px; margin:4px 0; }
  .ed-subitem { font-size:13px; color:var(--text-soft); padding:3px 9px; background:var(--bg); border:1px solid var(--border); border-radius:7px; }
  #ed-subadd { flex:1; }
  #fab { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:var(--accent); color:var(--accent-ink); font-size:26px; font-weight:700; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; border:3px solid var(--bg); box-shadow:0 2px 10px var(--shadow); cursor:pointer; z-index:2; }
  .seg { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { padding:6px 12px; border:0; background:transparent; color:var(--text-muted); font-size:13px; cursor:pointer; }
  .seg button.sel { background:var(--accent); color:var(--accent-ink); font-weight:600; }
  .newbtn { margin-left:auto; padding:6px 12px; border:1px solid var(--accent); border-radius:8px; background:transparent; color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; }
  body.f-arbeit [data-notebook="Privat"] { display:none; }
  body.f-privat [data-notebook="Arbeit"] { display:none; }
  #newdlg, #notedlg { display:none; position:fixed; inset:0; background:var(--overlay); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box select { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  #nw-prio { display:flex; gap:6px; }
  #nw-prio .pbtn { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; }
  #nw-prio .pbtn.sel { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  #printhead { display:none; }
  #printfoot { display:none; }
  .themebtn { background:transparent; border:0; color:var(--text-muted); cursor:pointer; font-size:18px; padding:4px 8px; line-height:1; }
  @media (min-width:900px){
    body.unlocked #app { margin-right:42%; }
    body.unlocked .toolbar { right:42%; }
    body.unlocked:not(.newmode) #editor { display:block !important; position:fixed; inset:0 0 0 auto; width:42%; background:var(--bg); border-left:1px solid var(--border); padding:20px 22px 80px; overflow:auto; align-items:initial; justify-content:initial; }
    body.unlocked.newmode #newdlg { display:block !important; position:fixed; inset:0 0 0 auto; width:42%; background:var(--bg); border-left:1px solid var(--border); padding:20px 22px 80px; overflow:auto; align-items:initial; justify-content:initial; }
    body.unlocked.newmode #newdlg .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    #editor .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    #editor .ed-actions { display:none; }
    #content [data-id].selected { outline:2px solid var(--accent); outline-offset:-2px; border-radius:8px; }
    /* Whiteboard-Tab: kein ToDo-Editor-Dock -> volle Breite */
    body.wbfull.unlocked:not(.newmode) #app { margin-right:0; }
    body.wbfull.unlocked:not(.newmode) .toolbar { right:0; }
    body.wbfull.unlocked:not(.newmode) #editor { display:none !important; }
  }
  @page { margin: 14mm 12mm 16mm 12mm; }
  @media print {
    body { background:#fff; color:#000; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .gate, #pull, #filterbar, #searchbar, #pcstatus, .toolbar, .tabs, #editor, #newdlg, #notedlg, #fallback, #toast, .noteico, .donewrap, .delsec, .grpcopy, .copyico, .grpprint { display:none !important; }
    body.print-section .grp:not(.printtarget) { display:none !important; }
    #printhead { display:flex; justify-content:space-between; font-weight:600; border-bottom:1px solid #000; padding-bottom:6px; margin-bottom:12px; }
    .pane { padding:0; max-width:none; }
    .pane h4 { color:#000; }
    .focuscard, .item, .item.sub, .grp { background:#fff !important; color:#000 !important; border-color:#bbb !important; }
    .grp { border:none !important; }
    .focuscard { border:1px solid #ccc !important; }
    .focuscard.hi { border-left:3px solid #f87171 !important; }
    .focuscard.sixt { border-left:3px solid #fbbf24 !important; }
    .focuscard.overdue { border-left:4px solid #f87171 !important; }
    summary.grp-title, summary.grp-title span, .txt, .area, .due, .prog, .note, .note * { color:#000 !important; }
    .note code, .wnote code { background:transparent !important; border:0 !important; padding:0 !important; }
    .due.soon { color:#c0392b !important; }
    .note { border-left:2px solid #999 !important; }
    .pri { background:#fff !important; border:1px solid currentColor !important; }
    .p-hi { color:#c0392b !important; }
    .p-mid { color:#b7791f !important; }
    .p-lo { color:#0f766e !important; }
    /* ganze ToDo-Einheit (Karte + Notiz + Unteraufgaben) zusammenhalten -> rutscht bei
       Bedarf komplett auf die naechste Seite statt die Notiz zu zerteilen. NUR Gruppen
       (.grp) duerfen fliessen, sonst springt eine ganze Gruppe -> leere Seite 1. */
    .focusparent, .parent, .focuscard, .item { break-inside: avoid; }
    .focusparent .note, .focusparent .fsubs, .parent .note, .parent .subs { break-inside: avoid; }
    /* kompakter im Druck: weniger Weissraum, mehr pro Seite */
    .focusparent { margin-bottom: 4px !important; }
    .focuscard { padding: 5px 8px !important; margin-bottom: 0 !important; }
    .item, .item.sub { padding: 2px 6px !important; }
    /* Druck: ruhige Liste statt verschachtelter Kaesten -> Item-Rahmen weg,
       stattdessen eine Trennlinie zwischen den Top-Level-ToDos. */
    .item, .item.sub { border:none !important; }
    .parent { border-bottom:1px solid #999 !important; padding-bottom:6px; margin-bottom:6px; }
    .parent:last-child { border-bottom:none !important; }
    /* Druck: Checkbox aus der Fuehrung in die Fusszeile direkt vor das @Faellig-Badge. */
    .item > .txt { order:0; }
    .item > .pri { order:1; }
    .item > .chk { order:2; }
    .item > .due { order:3; }
    .item > .created { order:4; }
    .item > .prog { order:5; }
    .subs { margin: 2px 0 0 !important; }
    .note { margin: 2px 0 4px !important; padding: 1px 0 1px 8px !important; }
    .lbody { padding-left:12px !important; }
    .fsubs, .fnote { margin: 2px 0 !important; }
    .grp > summary, .grp-title { margin: 6px 0 3px !important; }
    /* eigene Fusszeile: auf jeder Seite (position:fixed wird von Chrome wiederholt) */
    #printfoot { display:block !important; position:fixed; left:12mm; right:12mm; bottom:7mm;
      text-align:center; font-size:9px; color:#444; border-top:1px solid #bbb; padding-top:4px;
      background:#fff; }
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <h1><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M128,112a28,28,0,0,0-8,54.83V184a8,8,0,0,0,16,0V166.83A28,28,0,0,0,128,112Zm0,40a12,12,0,1,1,12-12A12,12,0,0,1,128,152Zm80-72H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"/></svg> ToDo</h1>
  <form id="gateform" onsubmit="unlock(); return false">
    <input type="text" id="pinuser" name="username" autocomplete="username" value="todo" readonly class="userhide" tabindex="-1" aria-hidden="true">
    <div class="pinwrap">
      <input id="pin" name="password" type="password" placeholder="PIN" autocomplete="current-password" autofocus>
      <button type="button" class="reveal" onclick="togglePin()" aria-label="Passwort anzeigen"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.34c18.83-18.83,27.3-37.61,27.65-38.4A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231.05,128C223.84,141.46,192.43,192,128,192Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"/></svg></button>
    </div>
    <button type="submit">Entsperren</button>
  </form>
  <div class="err" id="err"></div>
</div>
<div id="app">
  <div id="pull"></div>
  <div id="filterbar">
    <div class="seg" id="seg">
      <button data-f="" onclick="setFilter(this)">Alle</button>
      <button data-f="arbeit" onclick="setFilter(this)">Arbeit</button>
      <button data-f="privat" onclick="setFilter(this)">Privat</button>
    </div>
    <button class="newbtn" onclick="printNow()" aria-label="Drucken"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M214.67,72H200V40a8,8,0,0,0-8-8H64a8,8,0,0,0-8,8V72H41.33C27.36,72,16,82.77,16,96v80a8,8,0,0,0,8,8H56v32a8,8,0,0,0,8,8H192a8,8,0,0,0,8-8V184h32a8,8,0,0,0,8-8V96C240,82.77,228.64,72,214.67,72ZM72,48H184V72H72ZM184,208H72V160H184Zm40-40H200V152a8,8,0,0,0-8-8H64a8,8,0,0,0-8,8v16H32V96c0-4.41,4.19-8,9.33-8H214.67c5.14,0,9.33,3.59,9.33,8Zm-24-52a12,12,0,1,1-12-12A12,12,0,0,1,200,116Z"/></svg></button>
    <button id="themebtn" class="themebtn" onclick="toggleTheme()" aria-label="Hell/Dunkel umschalten" title="Hell/Dunkel">◐</button>
  </div>
  <div id="searchbar"><input id="q" type="search" placeholder="Suche…" autocomplete="off" oninput="listSearch(this.value)"></div>
  <div id="pcstatus" class="pcstatus" style="display:none"></div>
  <div id="printhead"></div>
  <div id="printfoot"></div>
  <main id="content"></main>

function listSearch(q){
  q = (q || '').trim().toLowerCase();
  const content = document.getElementById('content');
  if (!content) return;
  const match = el => !q || (el.dataset.text || '').toLowerCase().includes(q);
  // Struktur: einzelne Karten aus-/einblenden
  content.querySelectorAll('details.grp [data-text]').forEach(r => r.classList.toggle('nomatch', !match(r)));
  // Fokus: Eltern-Einheit als Ganzes (sichtbar, wenn irgendein ToDo darin passt)
  content.querySelectorAll('.focusparent').forEach(p => {
    const hit = !q || [...p.querySelectorAll('[data-text]')].some(match);
    p.classList.toggle('nomatch', !hit);
  });
  // Struktur-Gruppen ohne Treffer ausblenden (Bereiche UND Themen-Untergruppen)
  content.querySelectorAll('details.grp, details.tgrp').forEach(g => {
    const hit = !q || g.querySelector('[data-text]:not(.nomatch)');
    g.classList.toggle('nomatch', !hit);
  });
  // Gruppen mit Treffern aufklappen; nur die VON DER SUCHE geoeffneten (data-sopen)
  // wieder schliessen -- vom User selbst geoeffnete bleiben offen (Muster wie
  // data-reclose beim Drucken).
  content.querySelectorAll('details.grp, details.tgrp').forEach(g => {
    const hit = q && !g.classList.contains('nomatch');
    if (hit && !g.open){ g.dataset.sopen = '1'; g.open = true; }
    else if (!hit && g.dataset.sopen){ g.open = false; delete g.dataset.sopen; }
  });
  highlightMatches(content, q);
}
function highlightMatches(content, q){
  // alte Markierungen entfernen
  content.querySelectorAll('mark.shl').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  content.querySelectorAll('.txt').forEach(t => t.normalize());
  if (!q) return;
  content.querySelectorAll('[data-text]:not(.nomatch) .txt').forEach(txt => {
    [...txt.childNodes].forEach(node => {
      if (node.nodeType !== 3) return;
      const s = node.nodeValue, low = s.toLowerCase();
      let i = low.indexOf(q);
      if (i < 0) return;
      const frag = document.createDocumentFragment();
      let last = 0;
      while (i >= 0){
        frag.appendChild(document.createTextNode(s.slice(last, i)));
        const m = document.createElement('mark');
        m.className = 'shl';
        m.textContent = s.slice(i, i + q.length);
        frag.appendChild(m);
        last = i + q.length;
        i = low.indexOf(q, last);
      }
      frag.appendChild(document.createTextNode(s.slice(last)));
      node.replaceWith(frag);
    });
  });
}

function resetPrintState(){

  document.querySelectorAll('details[data-reclose]').forEach(d => { d.open = false; delete d.dataset.reclose; });

let WIKI = null;        // key -> record, nur im Speicher (KEIN localStorage = Klartext-Schutz)

function wesc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function ensureWiki(){
  if (WIKI) return true;
  if (_wikiLoad) return _wikiLoad;
  const body = document.getElementById('wikibody');
  body.innerHTML = '<p class="wmsg">Wiki wird geladen\u2026</p>';
  _wikiLoad = (async () => {
    try {
      let raw, offline = false;
      try {
        const r = await fetch('wiki.enc.json?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) throw new Error('fetch');
        raw = await r.json();
        cacheBlob('encWiki', raw);
      } catch(netErr) {
        raw = loadBlob('encWiki');
        if (!raw) throw netErr;
        offline = true;
      }
      const arr = JSON.parse(await decryptPayload(raw, PIN));
      WIKI = {};
      arr.forEach(n => { WIKI[n.key] = n; });
      if (offline) toast('offline \u2013 letzter Stand');
      return true;
    } catch(e) {
      WIKI = null;
      body.innerHTML = '<p class="wmsg">Wiki konnte nicht geladen werden. '
        + '<button class="wretry" onclick="openWiki()">Erneut versuchen</button></p>';
      return false;
    } finally {
      _wikiLoad = null;

  })();

}

function showNote(key, push){

  if (push !== false && WIKI_STACK[WIKI_STACK.length - 1] !== key) WIKI_STACK.push(key);
  // n.html ist server-seitig gerendertes Markdown aus der eigenen, vertrauenswürdigen Wiki
  body.innerHTML = '<article class="wnote">' + n.html + '</article>';

  c.innerHTML = back + '<span class="wtitle">' + wesc(title || '') + '</span>';

function wikiBack(){
  if (WIKI_STACK.length > 1) { WIKI_STACK.pop(); showNote(WIKI_STACK[WIKI_STACK.length - 1], false); }

function wikiSearch(q){
  if (!WIKI) return;

function wbDatedEntry(){
  const ti = document.getElementById('wb-title');
  const title = (ti.value || '').trim();
  const header = '**' + localStampDe() + (title ? ' — ' + title : '') + '**';
  const old = noteGet('wb-note');
  noteSet('wb-note', header + '\n\n' + (old || ''));   // immer Leerzeile als sauberer Tippstart
  ti.value = '';
  const { ce } = _noteFields('wb-note');
  if (ce){
    ce.focus();
    // Caret in den 2. Block (die Leerzeile nach dem Datum-Kopf) -> nicht im fetten Kopf tippen
    const target = ce.children.length > 1 ? ce.children[1] : ce.lastElementChild;
    if (target){
      const sel = ce.ownerDocument.getSelection();
      const range = ce.ownerDocument.createRange();
      range.selectNodeContents(target); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    }
    try {
      const d = ce.ownerDocument;
      if (d.queryCommandState && d.queryCommandState('bold')) d.execCommand('bold');
      if (d.queryCommandState && d.queryCommandState('italic')) d.execCommand('italic');
    } catch(e){}
    ceSyncToolbar('wb-note');
  }
  wbInput();
}
let _wbConvNodes = null;
function _wbIsDateBlock(el){
  // Datum-Kopf = Block, dessen einziger Inhalt fett ist (deckungsgleich mit der CSS-Regel
  // '#wb-note p:has(> strong:only-child)' in render._FRAGMENT_CSS -> bei Aenderung beide anpassen).
  if (!el || el.nodeType !== 1) return false;
  const s = el.querySelector(':scope > strong');
  return !!s && el.textContent.trim() === s.textContent.trim();
}
function _wbTopBlock(node, ce){           // direktes Kind-Block von ce
  while (node && node.parentNode && node.parentNode !== ce) node = node.parentNode;
  return (node && node.parentNode === ce) ? node : null;
}
function _wbEntryNodes(ce, start){        // start + Folgegeschwister bis zum naechsten Datum-Kopf
  if (!start) return [];
  const nodes = [start];
  let n = start.nextElementSibling;
  while (n && !_wbIsDateBlock(n)) { nodes.push(n); n = n.nextElementSibling; }
  return nodes;
}
function _wbEntryMarkdown(ce, nodes){     // Markdown der gesammelten Knoten
  const tmp = ce.ownerDocument.createElement('div');
  nodes.forEach(x => tmp.appendChild(x.cloneNode(true)));
  return editableToMd(tmp);
}
function wbToTodo(){
  const { ce } = _noteFields('wb-note');
  if (!ce) return;
  const sel = ce.ownerDocument.getSelection();
  let start = (sel && sel.anchorNode && ce.contains(sel.anchorNode))
    ? _wbTopBlock(sel.anchorNode, ce) : ce.firstElementChild;
  const nodes = _wbEntryNodes(ce, start);
  if (!nodes.length) { toast('nichts zu \u00fcberf\u00fchren'); return; }
  const lines = _wbEntryMarkdown(ce, nodes).split('\n');
  let i = 0;
  while (i < lines.length && (lines[i].trim() === '' || /^\*\*.*\*\*$/.test(lines[i].trim()))) i++;
  const textLine = i < lines.length ? lines[i].replace(/^\s*[-*]\s+/, '').trim() : '';
  if (!textLine) { toast('Keine Zeile zum \u00dcberf\u00fchren'); return; }
  const note = lines.slice(i + 1).filter(l => l.trim() !== '').join('\n');
  openNew();
  _wbConvNodes = nodes;
  document.getElementById('nw-text').value = textLine;
  if (note) noteSet('nw-note', note);
  const av = document.getElementById('nw-area'); if (av) av.focus();
}
function wbApplyRemoval(){
  if (!_wbConvNodes) return;
  const nodes = _wbConvNodes; _wbConvNodes = null;
  nodes.forEach(x => { if (x && x.parentNode) x.parentNode.removeChild(x); });
  wbInput();
}
async function openWhiteboard(){
  // Nach Reload ist das Feld leer: lokalen Entwurf (wbCache) wieder einsetzen,
  // damit ungesyncte Offline-Eintraege sichtbar bleiben.
  if (!noteGet('wb-note')) { const c = loadBlob('wbCache'); if (c) noteSet('wb-note', c); }
  const queuedWb = loadQ().some(s => s.whiteboard !== undefined);
  if (WB_DIRTY || queuedWb) return;
  let text = null;
  try {
    const r = await fetch('whiteboard.enc.json?t=' + Date.now(), { cache:'no-store' });
    if (!r.ok) throw new Error('fetch');
    const raw = await r.json();
    cacheBlob('encWhiteboard', raw);
    text = JSON.parse(await decryptPayload(raw, PIN));
  } catch(e) {
    const raw = loadBlob('encWhiteboard');
    if (raw) { try { text = JSON.parse(await decryptPayload(raw, PIN)); } catch(_){} }
    if (text === null) { const c = loadBlob('wbCache'); if (c !== null && c !== undefined) text = c; }
  }
  if (text !== null && text !== undefined) { noteSet('wb-note', text); cacheBlob('wbCache', text); }
}
function localStampSv(){ const d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
function randHex(nbytes){
  const a = new Uint8Array(nbytes); crypto.getRandomValues(a);
  return [...a].map(b => b.toString(16).padStart(2,'0')).join('');
}
function randSecret(){
  const a = new Uint8Array(16); crypto.getRandomValues(a);
  let s = btoa(String.fromCharCode.apply(null, a));
  return s.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/=+$/,'');
}
function randCode(){
  const a = new Uint32Array(1); crypto.getRandomValues(a);
  return String(a[0] % 1000000).padStart(6,'0');
}
async function shareCreateSubmit(){
  const label = (document.getElementById('sh-label').value || '').trim();
  const nb = document.getElementById('sh-notebook').value;
  const scopes = [...document.querySelectorAll('#sh-areas input:checked')]
    .map(c => ({ notebook: nb, area: c.value }));
  if (!scopes.length){ toast('Bitte mindestens einen Bereich wählen'); return; }
  const entry = {
    token: randHex(8), link_secret: randSecret(), code: randCode(),
    label: label, scopes: scopes, active: true, created: localStampSv()
  };
  if (!SHARES_DATA) SHARES_DATA = { base_url: '', shares: [] };
  SHARES_DATA.shares.unshift(entry);     // optimistisch
  renderShares(SHARES_DATA);
  const res = document.getElementById('sh-result');
  res.innerHTML = '<div>Link: ' + wesc(shareLink(entry)) + '</div>'
    + '<div>Code: ' + wesc(entry.code) + '</div>'
    + '<div>(f\u00fcr die eingeladene Person erst nach dem n\u00e4chsten Sync nutzbar)</div>';
  document.getElementById('sh-label').value = '';
  document.querySelectorAll('#sh-areas input:checked').forEach(inp => { inp.checked = false; });
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), shareOps: [{
    op: 'create', token: entry.token, link_secret: entry.link_secret, code: entry.code,
    label: entry.label, scopes: entry.scopes }] });
}
function _shareFind(token){ return (SHARES_DATA && SHARES_DATA.shares || []).find(s => s.token === token); }
async function shareRevoke(token){
  const s = _shareFind(token); if (s) s.active = false;
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'revoke', token: token }] });
}
async function shareRemoveScope(token, notebook, area){
  const s = _shareFind(token);
  if (s) s.scopes = (s.scopes||[]).filter(sc => !(sc.notebook === notebook && sc.area === area));
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'removeScope', token: token, notebook: notebook, area: area }] });
}
async function shareExtendScope(token, area){
  if (!area) return;
  const s = _shareFind(token); if (!s) return;
  if (!s.scopes) s.scopes = [];
  const nb = (s.scopes[0] && s.scopes[0].notebook) || 'Privat';
  s.scopes.push({ notebook: nb, area: area });
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'extend', token: token, notebook: nb, area: area }] });
}
let SHARES_DATA = null;
async function openShares(){
  const body = document.getElementById('sharesbody');
  try {
    let raw;
    try {
      const r = await fetch('shares-admin.enc.json?t=' + Date.now(), { cache:'no-store' });
      if (!r.ok) throw new Error('fetch');
      raw = await r.json();
      cacheBlob('encSharesAdmin', raw);
    } catch(netErr) {
      raw = loadBlob('encSharesAdmin');
      if (!raw) throw netErr;
    }
    SHARES_DATA = JSON.parse(await decryptPayload(raw, PIN));
  } catch(e) {
    body.innerHTML = '<p class="wmsg">Freigaben konnten nicht geladen werden. '
      + '<button class="wretry" onclick="openShares()">Erneut versuchen</button></p>';
    return;
  }
  fillShareAreas();
  renderShares(SHARES_DATA);
}
function shareLink(s){
  const base = (SHARES_DATA && SHARES_DATA.base_url) || '';
  return base ? base + '#' + s.token + '.' + s.link_secret : '#' + s.token + '.' + s.link_secret;
}
function renderShares(data){
  const body = document.getElementById('sharesbody');
  const list = (data && data.shares) || [];
  if (!list.length){ body.innerHTML = '<p class="wmsg">Noch keine Freigaben.</p>'; return; }
  // Werte (Token/Bereich) wandern ueber data-*-Attribute + delegierte Listener, nicht in
  // onclick-Strings -- so brechen Ordnernamen mit Apostroph die Handler nicht (wesc escaped kein ').
  body.innerHTML = list.map(s => {
    const tok = wesc(s.token);
    const scopes = (s.scopes||[]).map(sc =>
      '<span class="sh-scope">' + wesc(areaLabel(sc.area)) +
      ' <button class="sh-rmscope" data-token="' + tok + '" data-notebook="' + wesc(sc.notebook) +
      '" data-area="' + wesc(sc.area) + '" title="Bereich entfernen">\u00d7</button></span>').join('');
    const nb = (s.scopes[0] && s.scopes[0].notebook) || 'Privat';
    const have = new Set((s.scopes||[]).map(sc => sc.area));
    const addable = knownAreas(nb).filter(a => !have.has(a));
    const addSel = addable.length
      ? '<select class="sh-addscope" data-token="' + tok + '">'
        + '<option value="">+ Bereich\u2026</option>'
        + addable.map(a => '<option value="' + wesc(a) + '">' + wesc(areaLabel(a)) + '</option>').join('')
        + '</select>'
      : '';
    const code = wesc(s.code || '');
    return '<div class="shrow' + (s.active ? '' : ' revoked') + '" data-token="' + tok + '">'
      + '<div><b>' + wesc(s.label || '(ohne Label)') + '</b>'
      + (s.active ? '' : ' \u2014 widerrufen') + '</div>'
      + '<div class="sh-link" onclick="copyText(this.textContent)">' + wesc(shareLink(s)) + '</div>'
      + '<div>Code: <span class="sh-code">' + code.slice(0,3) + ' ' + code.slice(3) + '</span></div>'
      + '<div class="sh-scopes">' + scopes + addSel + '</div>'
      + (s.active ? '<button class="sh-act sh-revoke" data-token="' + tok + '">Widerrufen</button>' : '')
      + '</div>';
  }).join('');
}

function copyText(text){ navigator.clipboard && navigator.clipboard.writeText(text).then(() => toast('kopiert')); }
function cacheBlob(key, obj){ try { localStorage.setItem(key, JSON.stringify(obj)); } catch(_){} }
function loadBlob(key){ try { return JSON.parse(localStorage.getItem(key)); } catch(_){ return null; } }
async function fetchPayload(){
  const r = await fetch('todos.enc.json?t=' + Date.now(), { cache:'no-store' });
  if (!r.ok) throw new Error('fetch');
  return await r.json();
}
async function decryptPayload(p, pin){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(p.salt), iterations:p.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(p.iv) }, key, b64(p.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const pin = document.getElementById('pin').value;
  const err = document.getElementById('err'); err.textContent = '';
  let offline = false;
  try {
    let payload;
    try {
      payload = await fetchPayload();
      cacheBlob('encTodos', payload);
    } catch(netErr) {
      payload = loadBlob('encTodos');
      if (!payload) throw netErr;
      offline = true;
    }
    const env = parseEnvelope(await decryptPayload(payload, pin));
    PIN = pin;
    INBOX = env.inbox || null;
    LAST_RENDERED = env.renderedAt || null;
    document.getElementById('content').innerHTML = env.html;
    applyPending();
    updatePcStatus();
    preselectFirst();
    applyDueTimes();
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.body.classList.add('unlocked');
    applyFilter(localStorage.getItem('todoFilter') || '');
    if (offline) toast('offline \u2013 letzter Stand');
    flushQueue();
  } catch (e) {
    err.textContent = 'Falsche PIN oder keine Verbindung';
  }
}
function togglePin(){

  const willShow = p.type === 'password';
  p.type = willShow ? 'text' : 'password';
  const b = document.querySelector('.reveal');
  if (b) b.innerHTML = willShow ? ICON_EYE_SLASH : ICON_EYE;
  if (b) b.setAttribute('aria-label', willShow ? 'Passwort verbergen' : 'Passwort anzeigen');
}
async function refresh(){
  if (PIN === null) return;
  try {
    // Gemerkte ("Speichern"), aber noch nicht gesendete Aenderungen NICHT verwerfen:
    // erst an den PC senden, sonst gingen sie beim Neuladen verloren ("nachgetragenes
    // verschwindet"). submitChanges sendet {done,reopen,edits} und leert EDITS selbst.
    if (Object.keys(EDITS).length) await submitChanges();
    const payload = await fetchPayload();
    cacheBlob('encTodos', payload);
    const env = parseEnvelope(await decryptPayload(payload, PIN));
    INBOX = env.inbox || INBOX;
    LAST_RENDERED = env.renderedAt || null;
    Object.keys(EDITS).forEach(k => delete EDITS[k]);
    document.getElementById('content').innerHTML = env.html;
    applyPending();
    updatePcStatus();
    const qel = document.getElementById('q'); if (qel) qel.value = '';
    preselectFirst();
    applyDueTimes();
    document.getElementById('fallback').style.display = 'none';
    const at = document.querySelector('.tab.active');
    if (at && at.dataset.pane === 'wiki' && WIKI && WIKI_STACK.length) {
      showNote(WIKI_STACK[WIKI_STACK.length - 1], false);
    }
    toast('aktualisiert');
    checkShellUpdate();
    reconcile();
  } catch (e) {
    toast('Fehler beim Aktualisieren: ' + ((e && (e.name + (e.message ? ' ' + e.message : ''))) || e));
  }
}
// Pull-to-Refresh: eigene Wisch-Geste -> refresh() (KEIN Reload, bleibt angemeldet)
let pullStartY = null, pullDist = 0;
const PULL_THRESHOLD = 70;
window.addEventListener('touchstart', e => {
  pullStartY = (PIN !== null && window.scrollY <= 0) ? e.touches[0].clientY : null;
  pullDist = 0;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (pullStartY === null) return;
  pullDist = e.touches[0].clientY - pullStartY;
  const ind = document.getElementById('pull');
  if (pullDist > 0 && window.scrollY <= 0) {
    ind.style.height = Math.min(pullDist, 90) + 'px';
    ind.textContent = pullDist > PULL_THRESHOLD ? '\u2193 Loslassen zum Aktualisieren' : '\u2193 Ziehen zum Aktualisieren';
  } else {
    ind.style.height = '0px';
  }
}, { passive: true });
window.addEventListener('touchend', () => {
  if (pullStartY === null) return;
  document.getElementById('pull').style.height = '0px';
  const trigger = pullDist > PULL_THRESHOLD;
  pullStartY = null; pullDist = 0;
  if (trigger) refresh();
}, { passive: true });

function areaLabel(raw){
  const fel = document.getElementById('allareas');
  if (fel) {
    try { const m = JSON.parse(fel.dataset.labels || '{}'); if (m[raw] !== undefined) return m[raw]; } catch(_){}
  }
  return raw;
}
function domAreas(notebook){
  const set = new Set();
  document.querySelectorAll('[data-area][data-notebook]').forEach(el => {
    if (el.dataset.notebook === notebook && el.dataset.area) set.add(el.dataset.area);
  });
  return [...set].sort();
}
function folderAreas(notebook){
  const fel = document.getElementById('allareas');
  if (!fel) return [];
  try { return (JSON.parse(fel.dataset.folders || '{}')[notebook] || []).slice(); } catch(_){ return []; }
}
function knownAreas(notebook){
  return [...new Set([...domAreas(notebook), ...folderAreas(notebook)])].sort();
}
function allTexts(){ return [...document.querySelectorAll('#content [data-text]')].map(el => el.dataset.text); }
function areaTopics(area){
  // vorhandene Topics dieses Bereichs aus den gerenderten ToDos sammeln (fillDatalist dedupt/sortiert)
  const out = [];
  document.querySelectorAll('#content [data-area]').forEach(el => {
    if (el.dataset.area !== area) return;
    const t = titleParts(el.dataset.text || '').topic;
    if (t) out.push(t);
  });
  return out;
}
function fillDatalist(id, values){
  const dl = document.getElementById(id);
  if (!dl) return;
  dl.innerHTML = [...new Set(values)].filter(Boolean).sort().map(v => '<option value="' + wesc(v) + '">').join('');

function areaOpt(a){ return '<option value="' + wesc(a) + '">' + wesc(areaLabel(a)) + '</option>'; }
function fillAreas(){
  const sel = document.getElementById('nw-area');
  const used = domAreas(nwNotebook);
  const usedSet = new Set(used);
  const folders = folderAreas(nwNotebook).filter(a => !usedSet.has(a)).sort();
  let html = '';
  if (used.length) {
    html += '<optgroup label="In Verwendung">'
      + used.map(areaOpt).join('')
      + '</optgroup>';
  }
  if (folders.length) {
    html += '<optgroup label="Ordner ohne ToDos">'
      + folders.map(areaOpt).join('')
      + '</optgroup>';
  }
  html += '<option value="__new__">\u2795 neuer Abschnitt\u2026</option>';
  sel.innerHTML = html;
  onAreaChange();
}

      const old = (meta || r).querySelector('.pri'); if (old) old.remove();
      if (ch.prio){
        const html = prioBadgeHtml(ch.prio);
        if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('due' in ch){
      r.dataset.due = ch.due;
      const old = (meta || r).querySelector('.due'); if (old) old.remove();
      if (ch.due){
        const html = dueBadgeHtml(ch.due);
        const pri = (meta || r).querySelector('.pri');
        if (pri) pri.insertAdjacentHTML('afterend', html);
        else if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('note' in ch){
      r.dataset.note = JSON.stringify(ch.note);
    }
    r.classList.add('edited');
  });
}
function addPendingFlag(r){
  r.classList.add('pending');
  if (!r.querySelector('.pendmark')){
    const s = document.createElement('span'); s.className = 'pendmark'; s.textContent = 'wartet';
    (r.querySelector('.meta') || r.querySelector('.txt') || r).appendChild(s);
  }
}
function markPending(area, id){
  document.querySelectorAll('#content [data-id]').forEach(r => {
    if (r.dataset.area === area && r.dataset.id === id) addPendingFlag(r);

}
function markPendingState(op, done){
  document.querySelectorAll('#content [data-id]').forEach(el => {
    if (el.dataset.area !== op.area || el.dataset.id !== op.id) return;
    const t = el.querySelector('.txt'), c = el.querySelector('.chk');
    if (t) t.classList.toggle('done', done);
    if (c) c.checked = done;
    addPendingFlag(el);
  });
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pendDataAttrs(op){
  return 'data-area="'+esc(op.area)+'" data-id="'+esc(op.text)+'" data-text="'+esc(op.text)+'" '
    + 'data-prio="'+(op.prio||'')+'" data-due="'+(op.due||'')+'" data-sixt="'+(op.sixt==='1'?'1':'0')+'" '
    + 'data-familie="'+(op.familie==='1'?'1':'0')+'" data-frau="'+(op.frau==='1'?'1':'0')+'" '
    + 'data-notebook="'+esc(op.notebook||'')+'" data-note="'+esc(JSON.stringify(op.note||''))+'"';
}
function pendHasReal(paneId, op){
  return [...document.querySelectorAll('#'+paneId+' [data-id]')].some(el =>
    !el.classList.contains('pending') && el.dataset.area === op.area && el.dataset.text === op.text);

function renderPendingCard(op){
  const focus = document.getElementById('focus');
  if (focus && !pendHasReal('focus', op)){
    focus.insertAdjacentHTML('beforeend',
      '<div class="focusparent" data-notebook="'+esc(op.notebook||'')+'">'
      + '<div class="focuscard pending" '+pendDataAttrs(op)+'><input type="checkbox" class="chk">'
      + '<span class="body"><span class="txt" onclick="openEdit(this)">'+esc(op.text)+'</span>'
      + '<span class="meta">'+prioBadgeHtml(op.prio)+dueBadgeHtml(op.due)
      + '<span class="pendmark">wartet</span></span></span></div></div>');
  }
  const struct = document.getElementById('structure');
  if (!struct) return;
  if (!pendHasReal('structure', op)){
    let grp = [...struct.querySelectorAll('details.grp')].find(g => g.dataset.area === op.area);
    if (!grp){
      grp = document.createElement('details'); grp.className = 'grp'; grp.open = true;
      grp.setAttribute('data-area', op.area); grp.setAttribute('data-notebook', op.notebook||'');
      grp.innerHTML = '<summary class="grp-title"><span>'+esc(areaLabel(op.area))+'</span>'
        + '<span class="grp-right"><span>0</span></span></summary>';
      struct.appendChild(grp);
    }
    grp.insertAdjacentHTML('beforeend',
      '<div class="parent"><div class="item pending" '+pendDataAttrs(op)+'>'
      + '<input type="checkbox" class="chk"><span class="txt" onclick="openEdit(this)">'+esc(op.text)+'</span>'
      + prioBadgeHtml(op.prio)+dueBadgeHtml(op.due)+'<span class="pendmark">wartet</span></div></div>');
  }
}
function pendInsertSubtask(op){
  document.querySelectorAll('#structure .parent > .item').forEach(it => {
    if (it.dataset.id !== op.parent) return;
    let subs = it.parentNode.querySelector('.subs');
    if (!subs){ subs = document.createElement('div'); subs.className = 'subs'; it.parentNode.appendChild(subs); }
    subs.insertAdjacentHTML('beforeend',
      '<div class="item sub pending" data-area="'+esc(op.area)+'" data-id="'+esc(op.parent+' \u203a '+op.text)+'" '
      + 'data-text="'+esc(op.text)+'" data-notebook="'+esc(op.notebook||'')+'" data-prio="" data-due="" '
      + 'data-sixt="0" data-familie="0" data-frau="0" data-note="&quot;&quot;">'
      + '<input type="checkbox" class="chk"><span class="txt" onclick="openEdit(this)">'+esc(op.text)+'</span>'
      + '<span class="pendmark">wartet</span></div>');
  });
}
function relTime(iso){
  if (!iso) return null;
  const t = Date.parse(iso); if (isNaN(t)) return null;
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'gerade eben';
  if (s < 3600) return 'vor ' + Math.floor(s/60) + ' Min';
  if (s < 86400) return 'vor ' + Math.floor(s/3600) + ' Std';
  const dd = new Date(t);
  return 'am ' + pad2(dd.getDate()) + '.' + pad2(dd.getMonth()+1) + '. ' + pad2(dd.getHours()) + ':' + pad2(dd.getMinutes());
}
function updatePcStatus(){
  const bar = document.getElementById('pcstatus'); if (!bar) return;
  const subs = Object.values(loadPending());
  const n = subs.reduce((a,e)=> a + ((e.sub.adds||[]).length + (e.sub.edits||[]).length + (e.sub.done||[]).length + (e.sub.reopen||[]).length), 0);
  const oldest = subs.reduce((a,e)=> Math.min(a, e.sentAt || Date.now()), Date.now());
  const stale = subs.length && (Date.now() - oldest > 900000);
  const last = relTime(LAST_RENDERED);
  if (!subs.length && !last){ bar.style.display = 'none'; return; }
  if (stale){
    bar.className = 'pcstatus offline';
    bar.textContent = 'PC offline? ' + n + ' \u00c4nderung(en) warten \u2013 sicher gespeichert, werden \u00fcbernommen, sobald der PC l\u00e4uft.';
    bar.style.display = 'block'; return;
  }
  let txt = last ? ('Letzter PC-Stand: ' + last) : '';
  if (subs.length) txt += (txt ? ' \u00b7 ' : '') + n + ' warten';
  bar.className = 'pcstatus';
  bar.textContent = txt; bar.style.display = txt ? 'block' : 'none';
}
function applyPending(){
  const subs = Object.values(loadPending());
  if (!subs.length) return;
  // Reihenfolge: neue ToDos zuerst (Task 4 fuellt renderPendingCard), dann Edits/Abhaken.
  for (const e of subs){ const sub = e.sub || {}; (sub.adds || []).forEach(op => { if (typeof renderPendingCard === 'function') { if (op.parent) pendInsertSubtask(op); else renderPendingCard(op); } }); }
  for (const e of subs){
    const sub = e.sub || {};
    (sub.edits || []).forEach(op => { markPending(op.area, op.id); reflectEdit({ area:op.area, id:op.id, text:op.id, notebook:op.notebook }, op); });
    (sub.done || []).forEach(op => markPendingState(op, true));
    (sub.reopen || []).forEach(op => markPendingState(op, false));
  }
}

function stageEdit(){
  if (!editRow) return;
  const d = editRow;
  const desc = document.getElementById('ed-text').value.trim();
  const topic = document.getElementById('ed-group').value.trim();
  // nur bei tatsaechlicher Topic-/Beschreibungs-Aenderung neu bauen -> sonst Original (keine Migration)
  const newText = (topic === (d.topic0 || '') && desc === (d.desc0 || '')) ? d.text : buildTitle(topic || null, desc);
  const sel = document.querySelector('#ed-prio .pbtn.sel');
  const newPrio = sel ? sel.dataset.v : d.prio;
  const edDate = document.getElementById('ed-due').value;
  const edTime = document.getElementById('ed-time').value;
  const newDue = edDate ? (edTime ? edDate + 'T' + edTime : edDate) : '';
  const newSixt = document.getElementById('ed-sixt').checked ? '1' : '0';
  const newFamilie = document.getElementById('ed-familie').checked ? '1' : '0';
  const newFrau = document.getElementById('ed-frau').checked ? '1' : '0';
  const newNote = noteGet('ed-note');
  const ch = { area:d.area, id:(d.id0 != null ? d.id0 : d.id), notebook:d.notebook };
  if (newText && newText !== d.text) ch.text = newText;
  if (newPrio !== d.prio) ch.prio = newPrio;
  if (newDue !== d.due) ch.due = newDue;
  if (newSixt !== d.sixt) ch.sixt = newSixt;
  if (newFamilie !== d.familie) ch.familie = newFamilie;
  if (newFrau !== d.frau) ch.frau = newFrau;
  if (newNote !== d.note) ch.note = newNote;
  if (Object.keys(ch).length > 3) {
    EDITS[d.area + '\u0000' + ch.id] = ch;   // Schluessel = Server-id (id0): mehrfaches Umbenennen kollabiert zu EINER Op
    reflectEdit(d, ch);
    if ('text' in ch) {   // optimistische Identitaet nachziehen (data-id wurde in reflectEdit aktualisiert)
      d.id = d.id.slice(0, d.id.length - d.text.length) + ch.text;
      d.text = ch.text;
    }
    toast('\u00c4nderung gemerkt');
  }
  const qel = document.getElementById('q'); if (qel && qel.value) listSearch(qel.value);
}

function pad2(n){ return String(n).padStart(2,'0'); }
function localStampDe(){

  return pad2(d.getDate()) + '.' + pad2(d.getMonth()+1) + '.' + d.getFullYear() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());

function b64bytes(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
async function encryptForInbox(obj, pin){
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:250000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt']);
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
  return { salt:b64bytes(salt), iv:b64bytes(iv), ct:b64bytes(ct), iter:250000 };
}
async function sendInbox(submission){
  const payload = await encryptForInbox(submission, PIN);
  const r = await fetch(INBOX.url + '/inbox', {
    method:'POST',
    headers:{ 'Authorization':'Bearer ' + INBOX.secret, 'Content-Type':'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) throw new Error('inbox ' + r.status);
}
const QKEY = 'inboxQueue';
function loadQ(){ try { return JSON.parse(localStorage.getItem(QKEY) || '[]'); } catch(e){ return []; } }
function saveQ(q){ localStorage.setItem(QKEY, JSON.stringify(q)); }
function enqueue(sub){ const q = loadQ(); q.push(sub); saveQ(q); }
const SENTKEY = 'sentIds';
function loadSent(){ try { return JSON.parse(localStorage.getItem(SENTKEY) || '{}'); } catch(e){ return {}; } }
function saveSent(m){ localStorage.setItem(SENTKEY, JSON.stringify(m)); }
function rememberSent(id){ if(!id) return; const m = loadSent(); m[id] = Date.now(); saveSent(m); }
function opLabel(op){ return (op && (op.text || op.id || op.name)) || 'Eintrag'; }
const PENDKEY = 'pendingOps';
function loadPending(){
  let m; try { m = JSON.parse(localStorage.getItem(PENDKEY) || '{}'); } catch(e){ m = {}; }
  const now = Date.now(); let dropped = 0;
  for (const id of Object.keys(m)){ if (now - (m[id].sentAt || 0) > 172800000){ delete m[id]; dropped++; } }
  if (dropped){ localStorage.setItem(PENDKEY, JSON.stringify(m)); toast(dropped + ' \u00c4nderung(en) konnten nicht best\u00e4tigt werden'); }
  return m;
}
function savePending(m){ localStorage.setItem(PENDKEY, JSON.stringify(m)); }
function rememberPending(sub){
  if (!sub || !sub.id) return;
  const has = (sub.adds||[]).length || (sub.edits||[]).length || (sub.done||[]).length || (sub.reopen||[]).length;
  if (!has) return;   // reine Whiteboard-/Sektions-Sync nicht als wartendes ToDo fuehren
  const m = loadPending(); m[sub.id] = { subId: sub.id, sentAt: Date.now(), sub: sub }; savePending(m);
}
function dropPending(id){ const m = loadPending(); if (m[id]){ delete m[id]; savePending(m); } }
async function fetchResults(){
  const r = await fetch('inbox-results.enc.json?t=' + Date.now(), { cache:'no-store' });
  if (!r.ok) return null;
  return await r.json();
}
async function reconcile(){
  if (PIN === null) return;
  const m = loadSent();
  const ids = Object.keys(m);
  if (!ids.length) return;
  let map;
  try { const p = await fetchResults(); if (!p) return; map = JSON.parse(await decryptPayload(p, PIN)); }
  catch(e){ return; }
  const now = Date.now();
  let changed = false;
  for (const id of ids){
    if (now - m[id] > 86400000){ delete m[id]; dropPending(id); changed = true; continue; }
    const res = map[id];
    if (!res) continue;
    (res.skipped || []).forEach(s => {
      toast("'" + opLabel(s.op) + "' wurde nicht gespeichert: " + (s.reason || 'abgelehnt'));
    });
    delete m[id]; dropPending(id); changed = true;
  }
  if (changed) saveSent(m);
}
async function flushQueue(){
  if (!INBOX || !INBOX.url) return;
  const q = loadQ(); if (!q.length) return;
  const rest = [];
  for (const sub of q) { try { await sendInbox(sub); } catch(e){ rest.push(sub); } }
  saveQ(rest);
  await reconcile();
  if (!rest.length) toast('Warteschlange gesendet');
}
async function sendOrQueue(sub){
  rememberSent(sub.id);
  rememberPending(sub);
  try {
    if (!INBOX || !INBOX.url) throw new Error('kein Worker');
    await sendInbox(sub);
    return true;
  } catch(e) { enqueue(sub); return false; }
}
window.addEventListener('online', flushQueue);
setInterval(applyDueTimes, 60000);
setInterval(updatePcStatus, 60000);
document.addEventListener('visibilitychange', () => { if (document.hidden) wbFlush(); });
async function submitChanges(){
  stageEdit();
  const done=[], reopen=[], edits=[];
  document.querySelectorAll('#content .chk').forEach(c => {
    const el = c.closest('[data-id]'); if (!el || el.classList.contains('pending')) return;
    const d = el.dataset;
    const wasDone = d.done === '1';
    if (c.checked && !wasDone) done.push({ notebook:d.notebook, area:d.area, id:d.id });
    else if (!c.checked && wasDone) reopen.push({ notebook:d.notebook, area:d.area, id:d.id });
  });
  Object.values(EDITS).forEach(e => edits.push(e));
  if (!done.length && !reopen.length && !edits.length) { toast('nichts ausstehend'); return; }
  const sent = await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), done, reopen, edits });
  // optimistisch: neu abgehakte ausblenden (Fokus + Struktur, via area+id)
  done.forEach(o => {
    document.querySelectorAll('#content [data-id]').forEach(el => {
      if (el.dataset.area === o.area && el.dataset.id === o.id) el.remove();
    });
  });
  // optimistisch: reaktivierte sofort als aktiv darstellen (Häkchen weg, nicht durchgestrichen)
  reopen.forEach(o => {
    document.querySelectorAll('#content [data-id]').forEach(el => {
      if (el.dataset.area === o.area && el.dataset.id === o.id) {
        el.removeAttribute('data-done');
        const x = el.querySelector('.chk'); if (x) x.checked = false;
        const tx = el.querySelector('.txt'); if (tx) tx.classList.remove('done');
      }
    });
  });
  Object.keys(EDITS).forEach(k => delete EDITS[k]);
  document.querySelectorAll('.edited').forEach(x => x.classList.remove('edited'));
  toast(sent === true ? 'an PC gesendet' : 'offline \u2013 gespeichert, wird automatisch gesendet');
}
