<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1117">
<script>(function(){try{var t=localStorage.getItem('theme');
if(!t)t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
document.documentElement.dataset.theme=t;}catch(e){document.documentElement.dataset.theme='dark';}})();</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ToDo</title>
<style>
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#0f1117; --surface:#161922; --surface-deep:#11141b; --surface-sub:#13161d;
    --surface-elevated:#1f2937; --overlay:rgba(0,0,0,.55); --shadow:rgba(0,0,0,.5);
    --border:#232733; --border-subtle:#2d333f;
    --text:#e6e9ef; --text-muted:#9aa4b2; --text-dim:#a3acba; --text-dim2:#8b93a1;
    --text-subtle:#7aa2a9; --text-soft:#cdd3df;
    --accent:#2dd4bf; --accent-ink:#06231f; --link:#7dd3fc; --xref:#4fa8a0;
    --danger:#f87171; --done:#4ade80;
    --prio-hi-bg:#3b1d1d; --prio-mid:#fbbf24; --prio-mid-bg:#3a2f17;
    --prio-lo:#5eead4; --prio-lo-bg:#1d2c2b; --overdue-bg:#251417; --sixt-bg:#1c1a12;
    --search-hi-bg:#3b3a16; --search-hi-text:#fde68a; --toast-bg:#232733; --toast-text:#e6e9ef;
  }
  html[data-theme="light"]{
    color-scheme: light;
    --bg:#f6f7f9; --surface:#ffffff; --surface-deep:#eef0f3; --surface-sub:#f0f2f5;
    --surface-elevated:#eceef2; --overlay:rgba(0,0,0,.45); --shadow:rgba(0,0,0,.18);
    --border:#e2e5ea; --border-subtle:#d7dbe1;
    --text:#1b1f27; --text-muted:#4b5563; --text-dim:#5b6472; --text-dim2:#6b7280;
    --text-subtle:#4b7a82; --text-soft:#3a4150;
    --accent:#0d9488; --accent-ink:#ffffff; --link:#0369a1; --xref:#1d7a72;
    --danger:#dc2626; --done:#16a34a;
    --prio-hi-bg:#fde8e8; --prio-mid:#b45309; --prio-mid-bg:#fdf0dd;
    --prio-lo:#0d9488; --prio-lo-bg:#d9f2ee; --overdue-bg:#fdecec; --sixt-bg:#fdf6e3;
    --search-hi-bg:#fde68a; --search-hi-text:#713f12; --toast-bg:#2b303b; --toast-text:#f6f7f9;
  }
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; }
  #updbar { position:fixed; left:0; right:0; bottom:0; z-index:200; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 16px; background:var(--bg); border-top:1px solid var(--accent); font-size:13px; color:var(--text); }
  #updbar button { background:var(--accent); color:var(--accent-ink); border:none; border-radius:8px; padding:6px 14px; font-weight:600; cursor:pointer; }
  header { padding:16px 24px 6px; }
  header h1 { margin:0; font-size:18px; }
  .gate { max-width:320px; margin:18vh auto 0; padding:0 24px; text-align:center; }
  .gate h1 { font-size:22px; margin:0 0 16px; }
  .gate input { width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); }
  .gate button[type="submit"] { margin-top:10px; width:100%; padding:11px; border:0; border-radius:8px; background:var(--accent); color:var(--accent-ink); font-weight:600; cursor:pointer; }
  .gate .err { color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }
  .gate form { margin:0; }
  .pinwrap { position:relative; }
  #pin { padding-right:44px; }
  .reveal { position:absolute; right:4px; top:50%; transform:translateY(-50%); width:auto; margin:0; padding:9px 12px; line-height:1; background:transparent; border:0; color:var(--text-muted); font-size:18px; cursor:pointer; }
  .ic { width:1em; height:1em; display:inline-block; vertical-align:-0.15em; } /* Zwilling in render.py _FRAGMENT_CSS */
  .gate input.userhide { position:absolute; width:1px; height:1px; padding:0; margin:-1px; border:0; opacity:0; pointer-events:none; }
  #app { display:none; }
  html, body { overscroll-behavior-y: contain; overscroll-behavior-x: none; overflow-x: hidden; }
  /* Kein seitliches Verschieben am Handy: x-Achse geklemmt (uebersteht breite Inhalte) */
  #pull { height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:13px; transition:height .12s ease; }
  .toolbar { position:fixed; bottom:0; left:0; right:0; display:flex; gap:8px; padding:10px 16px; background:var(--bg); border-top:1px solid var(--border); }
  .toolbar button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; transition:filter .08s; }
  .btn-refresh { background:var(--surface-elevated); color:var(--text); }
  .btn-copy { background:var(--accent); color:var(--accent-ink); }
  /* Statt Androids blauem Tap-Rechteck (oben global aus) eine dezente, themenneutrale
     Gedrueckt-Rueckmeldung -- dimmt Hinter- und Vordergrund gleichmaessig. */
  .toolbar button:active { filter:brightness(0.9); }
  #toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:var(--toast-bg); color:var(--toast-text); padding:8px 14px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; }
  #toast.show { opacity:1; }
  #fallback { display:none; padding:12px 16px; }
  #fallback textarea { width:100%; height:120px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:8px; }
  #editor { display:none; position:fixed; inset:0; background:var(--overlay); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .ed-box h3 { margin:0 0 10px; font-size:16px; }
  .ed-lab { display:block; font-size:11px; color:var(--text-muted); margin:10px 0 4px; }
  .ed-box input[type=text], .ed-box input[type=date], .ed-box input[type=time] { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  .ed-row input[type=date], .ed-row input[type=time] { width:auto; flex:1; min-width:0; }
  .ed-box textarea { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); resize:vertical; font-family:inherit; }
  #ed-note, #nw-note { min-height:100px; }
  #ed-prio { display:flex; gap:6px; }
  #ed-prio .pbtn { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; }
  #ed-prio .pbtn.sel { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  .ed-row { display:flex; gap:6px; align-items:center; }
  .ed-row button { padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); }
  .ed-actions { display:flex; gap:8px; margin-top:14px; }
  .ed-actions button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; }
  .ed-actions .ed-del { flex:0 0 auto; padding:11px 14px; background:transparent; color:var(--danger); border:1px solid var(--danger); }
  .ed-actions .ed-del:active { background:var(--danger); color:#fff; }
  .ed-cancel { background:var(--surface-elevated); color:var(--text); }
  .ed-ok { background:var(--accent); color:var(--accent-ink); }
  .ed-box-note { max-height:88vh; overflow:auto; }
  #nt-note { min-height:160px; }
  .ed-box textarea.mdfield { max-height:50vh; resize:none; }
  .mdbar { display:flex; gap:6px; margin-bottom:8px; }
  .mdbar button { flex:1; padding:9px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; cursor:pointer; }
  .mdbar button:active { background:var(--surface-elevated); }
  .mdbar button.active { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  div.mdprev { margin:0; min-height:40px; }
  .mdprev-empty { color:var(--text-dim2); }
  div.mdfield { min-height:100px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--surface-deep); line-height:1.4; overflow:auto; }
  div.mdfield ul { margin:4px 0; padding-left:20px; }
  div.mdfield h1, div.mdfield h2, div.mdfield h3 { margin:6px 0 2px; }
  div.mdfield code { font-family:inherit; font-size:inherit; background:transparent; border:0; padding:0; }
  .wb-termin { display:flex; gap:6px; margin-bottom:8px; }
  .wb-title { flex:1; min-width:0; padding:9px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:14px; box-sizing:border-box; }
  .wb-termin button { padding:9px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); cursor:pointer; white-space:nowrap; }
  .wb-field { width:100%; box-sizing:border-box; background:var(--surface-deep); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  #wb-note, #wb-note-fb { min-height:42vh; }   /* ID-Selektor schlaegt div.mdfield{min-height:100px} */
  body.wbfull #searchbar { display:none; }
  @media (max-width:899px){ #wb-note, #wb-note-fb { min-height:70vh; } }
  .wb-actions { margin:8px 0; }
  .wb-actions button { width:100%; padding:9px 0; border:1px solid var(--accent); border-radius:8px; background:var(--bg); color:var(--accent); font-size:13px; cursor:pointer; }
  .wb-actions button:active { background:var(--accent-ink); }
  #filterbar { display:flex; align-items:center; gap:8px; padding:8px 16px 0; }
  #searchbar { padding:8px 16px 0; }
  .pcstatus { padding:6px 16px; font-size:12px; color:var(--text-muted); }
  .pcstatus.offline { color:var(--danger); font-weight:600; }
  #q { width:100%; padding:8px 10px; font-size:14px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  .nomatch { display:none !important; }
  .tabbadge { margin-left:6px; background:var(--danger); color:#fff; border-radius:9px; padding:1px 6px; font-size:10px; font-weight:700; display:inline-block; min-width:8px; text-align:center; vertical-align:middle; }
  mark.shl { background:var(--search-hi-bg); color:var(--search-hi-text); border-radius:2px; padding:0 1px; }
  .wr-snip{font-size:.85em;opacity:.75;margin-top:2px;line-height:1.35;}
  .wr-snip mark{background:rgba(255,213,79,.35);color:inherit;padding:0 1px;border-radius:2px;}
  #content [data-id] { cursor:pointer; }
  #ed-subs { display:flex; flex-direction:column; gap:3px; margin:4px 0; }
  .ed-subitem { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-soft); padding:3px 9px; background:var(--bg); border:1px solid var(--border); border-radius:7px; }
  .ed-subitem .txt.done { text-decoration:line-through; color:var(--text-muted); }
  .ed-subitem .txt { flex:1; }
  .ed-subdel { flex:0 0 auto; border:0; background:transparent; color:var(--danger); font-size:16px; line-height:1; padding:0 4px; cursor:pointer; opacity:.75; }
  .ed-subdel:active { opacity:1; }
  #ed-subadd { flex:1; }
  #fab { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:var(--accent); color:var(--accent-ink); font-size:26px; font-weight:700; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; border:3px solid var(--bg); box-shadow:0 2px 10px var(--shadow); cursor:pointer; z-index:2; transition:filter .08s; }
  #fab:active { filter:brightness(0.9); }
  .seg { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .seg button { padding:6px 12px; border:0; background:transparent; color:var(--text-muted); font-size:13px; cursor:pointer; }
  .seg button.sel { background:var(--accent); color:var(--accent-ink); font-weight:600; }
  .newbtn { margin-left:auto; padding:6px 12px; border:1px solid var(--accent); border-radius:8px; background:transparent; color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; }
  body.f-arbeit [data-notebook="Privat"] { display:none; }
  body.f-privat [data-notebook="Arbeit"] { display:none; }
  /* Aufraeumen ist notizbuch-uebergreifend: der Alle/Arbeit/Privat-Filter darf seine
     Karten NICHT ausblenden (sonst verschwindet ein Privat-Kandidat auf dem Arbeit-Filter). */
  #aufraeumen [data-notebook] { display:block; }
  #zuarbeit [data-notebook] { display:block; }
  #newdlg, #notedlg { display:none; position:fixed; inset:0; background:var(--overlay); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box select { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
  #attview { display:none; position:fixed; inset:0; background:var(--overlay); z-index:60; align-items:center; justify-content:center; }
  #attview img { max-width:95vw; max-height:82vh; border-radius:8px; }
  #attsheet { display:flex; flex-direction:column; align-items:center; gap:10px; max-width:95vw; }
  #attname { color:#fff; font-size:13px; opacity:.85; max-width:90vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #attbar { display:flex; gap:8px; }
  #attbar button { padding:9px 16px; border:0; border-radius:8px; font-weight:600; font-size:14px; background:var(--surface-elevated); color:var(--text); cursor:pointer; }
  /* Interne Verweise: Vorschau-Karte (Task 6). Overlay-Optik wie #attview, aber zentriertes Blatt. */
  #xrefview { display:none; position:fixed; inset:0; background:var(--overlay); z-index:62; }
  #xrefsheet { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:12px; padding:14px; width:min(92vw,420px); box-shadow:0 6px 24px var(--shadow); }
  #xrefsheet .xref-ziel { display:block; width:100%; text-align:left; margin:6px 0 0; padding:8px 10px; background:var(--surface-elevated); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:14px; cursor:pointer; }
  #xrefsheet .xref-meta { color:var(--text-muted); font-size:.85em; margin:2px 0 8px; }
  #xrefsheet .xref-note { font-size:.9em; max-height:8em; overflow:hidden; color:var(--text-muted); }
  .xref-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
  .xref-actions button { padding:8px 14px; border:1px solid var(--border); border-radius:8px; background:var(--surface-elevated); color:var(--text); font-size:14px; cursor:pointer; }
  .xref-actions .ghost { background:transparent; color:var(--text-muted); }
  #nw-prio { display:flex; gap:6px; }
  #nw-prio .pbtn { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text-muted); font-size:13px; }
  #nw-prio .pbtn.sel { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600; }
  #printhead { display:none; }
  #printfoot { display:none; }
  /* Die Druck-Tabelle (#pwrap) ist am Bildschirm keine Tabelle: Tabelle, Koerper,
     Zeile und Zelle werden zu schlichten Bloecken ohne eigene Masse, #content fuellt
     wie zuvor die Breite. (display:contents waere eleganter, ist aber ausgerechnet
     fuer Tabellenteile browserabhaengig - display:block koennen alle.) Nur Kind-
     Kombinatoren, damit Tabellen in Notizen unberuehrt bleiben.
     Wozu die Tabelle ueberhaupt da ist: steht unten im Druck-Block. */
  #pwrap, #pwrap > tfoot, #pwrap > tbody,
  #pwrap > tfoot > tr, #pwrap > tbody > tr,
  #pwrap > tfoot > tr > td, #pwrap > tbody > tr > td {
    display:block; margin:0; padding:0; border:0; }
  #pfspace { display:none; }
  .themebtn { background:transparent; border:0; color:var(--text-muted); cursor:pointer; font-size:18px; padding:4px 8px; line-height:1; }
  @media screen and (min-width:900px){
    /* EINE gemeinsame zentrierte Inhaltsspalte fuer die ganze App: Filter, Suche,
       Tabs, Listen, Bearbeiten und Knopfleiste teilen Breite (928px = Pane 880 +
       2x24 Rand) und Kanten -- nichts spannt mehr ueber einen Ultrawide-Schirm,
       nichts springt beim Ansichtswechsel. */
    #app { max-width:928px; margin:0 auto; }
    #filterbar, #searchbar { padding-left:24px; padding-right:24px; }
    .toolbar { left:50%; right:auto; transform:translateX(-50%); width:100%; max-width:928px; box-sizing:border-box; border-left:1px solid var(--border); border-right:1px solid var(--border); border-radius:14px 14px 0 0; }
    /* Bearbeiten ist am PC eine eigene Ansicht auf Tab-Ebene (Klick auf ein ToDo ->
       body.editing + "Bearbeiten"-Tab-Chip): Panes zu, Editor in derselben Spalte
       unter der Tab-Zeile. Schliessen: Abbrechen/Speichern/Esc oder Tab-Wechsel. */
    body.unlocked.editing:not(.newmode) #content .pane { display:none !important; }
    body.unlocked.editing:not(.newmode) #editor { display:block !important; position:static; width:auto; max-width:928px; margin:0 auto; box-sizing:border-box; background:transparent; border:0; padding:18px 24px 96px; align-items:initial; justify-content:initial; }
    /* Notiz ist das Herzstueck -> in der Bearbeitungs-Ansicht deutlich mehr Hoehe */
    body.unlocked.editing:not(.newmode) #editor div.mdfield { min-height:38vh; }
    /* kompakte Formular-Zeilen: Prioritaet+Faelligkeit nebeneinander, Haken in einer Zeile */
    .ed-cols { display:flex; gap:18px; }
    .ed-cols > div { flex:1; min-width:0; }
    .ed-checks { display:flex; gap:22px; }
    body.unlocked.newmode #app { margin-right:42%; }
    body.unlocked.newmode .toolbar { left:0; right:42%; transform:none; max-width:none; border-radius:0; border-left:0; border-right:0; }
    body.unlocked.newmode #newdlg { display:block !important; position:fixed; inset:0 0 0 auto; width:42%; background:var(--bg); border-left:1px solid var(--border); padding:20px 22px 80px; overflow:auto; align-items:initial; justify-content:initial; }
    body.unlocked.newmode #newdlg .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    #editor .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    /* Aufraeumen-"Peek": Editor als echtes zentriertes Modal (kein docked). #editor behaelt
       den abdunkelnden Overlay-Hintergrund; die ed-box wird wieder eine abgegrenzte Karte,
       damit der Seiteninhalt NICHT durchscheint (setzt die Zeile darueber gezielt zurueck). */
    body.clnmodal #editor .ed-box { max-width:600px; border:1px solid var(--border); background:var(--surface); border-radius:12px; padding:18px; max-height:88vh; overflow:auto; }
    #content [data-id].selected { outline:2px solid var(--accent); outline-offset:-2px; border-radius:8px; }
  }
  /* .att-Basisstil kommt aus render.py _FRAGMENT_CSS (im Fragment injiziert, gilt global) */
  .att .attdel { margin-left:6px; border:0; background:transparent; color:inherit; opacity:.6; cursor:pointer; font-size:12px; padding:0 2px; }
  .att .attdel:active { opacity:1; }
  @page { margin: 14mm 12mm 16mm 12mm; }
  @media print {
    .atts { display:none !important; }
    body { background:#fff; color:#000; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .gate, #pull, #filterbar, #searchbar, #pcstatus, .toolbar, .tabs, #editor, #newdlg, #notedlg, #fallback, #toast, .noteico, .donewrap, .delsec, .grpcopy, .copyico, .grpprint, .grpnew, .tgrpnew { display:none !important; }
    .brc-bar { display:none !important; }
    body.print-section .grp:not(.printtarget) { display:none !important; }
    #printhead { display:flex; justify-content:space-between; font-weight:600; border-bottom:1px solid #000; padding-bottom:6px; margin-bottom:12px; }
    .pane { padding:0; max-width:none; }
    .pane h4 { color:#000; }
    .focuscard, .item, .item.sub, .grp { background:#fff !important; color:#000 !important; border-color:#bbb !important; }
    .grp { border:none !important; }
    .focuscard { border:1px solid #ccc !important; }
    .focuscard.hi { border-left:3px solid #f87171 !important; }
    .focuscard.sixt { border-left:3px solid #fbbf24 !important; }
    .focuscard.overdue { border-left:4px solid #f87171 !important; }
    summary.grp-title, summary.grp-title span, .txt, .area, .due, .prog, .note, .note * { color:#000 !important; }
    /* interne Verweise nicht nach aussen: Druck zeigt die gefilterte pub-Variante */
    .note.priv { display:none !important; }
    .note.pub { position:static !important; left:auto !important; width:auto !important; }
    /* auch eine Notiz ohne Quelle-Zeilen (kein priv/pub-Split) traegt im Druck noch
       echte .xref-Spans -- die gepunktete Klick-Unterstreichung gehoert nicht aufs Papier */
    .xref { text-decoration:none !important; cursor:auto; }
    .note code, .wnote code { background:transparent !important; border:0 !important; padding:0 !important; }
    .due.soon { color:#c0392b !important; }
    .note { border-left:2px solid #999 !important; }
    .pri { background:#fff !important; border:1px solid currentColor !important; }
    .p-hi { color:#c0392b !important; }
    .p-mid { color:#b7791f !important; }
    .p-lo { color:#0f766e !important; }
    /* Lange Notizen duerfen ueber Seiten fliessen (sonst springt eine ganze Aufgabe
       auf die naechste Seite und laesst eine halbe Seite leer). Zusammengehalten wird
       nur, was NICHT sinnvoll zerteilbar ist: die Titelzeile und jede einzelne
       Unteraufgaben-Zeile. break-after:avoid an der Titelzeile haelt Kopf + Notiz-
       Anfang zusammen, damit keine Ueberschrift allein am Seitenende steht;
       orphans/widows verhindern einzelne Notizzeilen am Seitenrand. */
    .item, .item.sub, .focuscard { break-inside: avoid; }
    .parent > .item, .focusparent > .focuscard { break-after: avoid; }
    summary.grp-title, summary.tgrp-title { break-after: avoid; }   /* Ueberschrift nicht allein am Seitenende */
    .lts { break-after: avoid; }   /* Datum-Kopf bleibt bei seinem Eintrag */
    .parent, .focusparent, .note, .subs, .fsubs, .fnote { break-inside: auto; }
    .note { orphans: 3; widows: 3; }
    /* kompakter im Druck: weniger Weissraum, mehr pro Seite */
    .focusparent { margin-bottom: 4px !important; }
    .focuscard { padding: 5px 8px !important; margin-bottom: 0 !important; }
    .item, .item.sub { padding: 2px 6px !important; }
    /* Druck: ruhige Liste statt verschachtelter Kaesten -> Item-Rahmen weg,
       stattdessen eine Trennlinie zwischen den Top-Level-ToDos. */
    .item, .item.sub { border:none !important; }
    .parent { border-bottom:1px solid #999 !important; padding-bottom:6px; margin-bottom:6px; }
    .parent:last-child { border-bottom:none !important; }
    /* Druck: Checkbox aus der Fuehrung in die Fusszeile direkt vor das @Faellig-Badge. */
    .item > .txt { order:0; }
    .item > .pri { order:1; }
    .item > .chk { order:2; }
    .item > .due { order:3; }
    .item > .created { order:4; }
    .item > .prog { order:5; }
    .subs { margin: 2px 0 0 !important; }
    .note { margin: 2px 0 4px !important; padding: 1px 0 1px 8px !important; }
    .lbody { padding-left:12px !important; }
    .fsubs, .fnote { margin: 2px 0 !important; }
    .grp > summary, .grp-title { margin: 6px 0 3px !important; }
    /* Platz fuer die Fusszeile freihalten -- der eigentliche Trick.
       position:fixed belegt keinen Platz: die Fusszeile schwebt ueber dem Textbereich,
       und sobald eine Seite bis unten voll wird, laeuft die letzte Zeile unter ihr
       durch (Nutzer-PDF 21.07.2026, Seiten 5/7/8/11). Chrome kennt keine @page-Rand-
       boxen (@bottom-center bleibt leer), und die Fusszeile aus dem Textbereich heraus
       zu schieben geht auch nicht: negative bottom-Werte und transform werden am
       Seitenrand abgeschnitten, die Fusszeile verschwindet dann komplett.
       Was Platz reserviert, ist ein echter Tabellenfuss: Chrome wiederholt <tfoot> auf
       jeder Seite UND haelt die Hoehe frei. #pfspace ist genau dieser Platzhalter --
       leer und unsichtbar, er haelt nur den unteren Streifen jeder Seite frei. Die
       sichtbare Fusszeile bleibt position:fixed und sitzt weiter fest am Blattfuss
       (auch auf einer halbleeren letzten Seite). Mit echtem Chrome-Druck gemessen:
       33 Seiten wie zuvor, Fusszeile auf jeder Seite, 0 Kollisionen, engster Abstand
       17pt (vorher -0.8pt = Ueberlappung). */
    #pwrap { display:table; width:100%; border-collapse:collapse; }
    #pwrap > tfoot { display:table-footer-group; }
    #pwrap > tbody { display:table-row-group; }
    #pwrap > tfoot > tr, #pwrap > tbody > tr { display:table-row; }
    #pwrap > tfoot > tr > td, #pwrap > tbody > tr > td { display:table-cell; padding:0; }
    #pfspace { display:block; height:7mm; }
    /* eigene Fusszeile: auf jeder Seite (position:fixed wird von Chrome wiederholt) */
    /* bottom:0 - NICHT groesser: Chrome positioniert position:fixed im Druck relativ
       zum Textbereich, jedes positive bottom laege also noch weiter im Text. */
    #printfoot { display:block !important; position:fixed; left:12mm; right:12mm; bottom:0;
      text-align:center; font-size:9px; color:#444; border-top:1px solid #bbb; padding-top:4px;
      background:#fff; }
  }
</style>

// --- Interne Verweise: Wortschatz + Auto-Verlinkung in Notizen -------------
// Aus den Haupt-ToDo-Titeln (#content [data-id], ohne Unteraufgaben) werden markante
// Bruchstuecke gewonnen; linkifyNotes umschliesst deren Erwaehnung in fremden Notizen
// mit span.xref. Idempotent (erst unwrap), nie in der Oeffentlich-Fassung (.note.pub)
// oder im Editor (.mdfield), nie als Selbstverweis.
let XREF = { map: new Map(), re: null };
let LINKREG = [];
const XW = 'A-Za-z0-9\\u00C0-\\u024F';           // Wortzeichen inkl. Umlaute

function xrefPhrases(title){
  const out = new Set();
  const m = title.match(/^"([^"]+)":\s*(.*)$/);
  const desc = m ? m[2] : title;
  if (m) out.add(m[1].trim());
  out.add(desc.trim());
  desc.split(/\s+[\u2014\u2013-]\s+|:\s+/).forEach(s => { s = s.trim(); if (s) out.add(s); });
  return [...out].filter(p => p.length >= 4 && p.split(/\s+/).length >= 2);
}

function xrefBuildVocab(){
  XREF = { map: new Map(), re: null };
  document.querySelectorAll('#content [data-id]').forEach(r => {
    const id = r.dataset.id || '';
    if (!id || id.includes('\u203a')) return;        // Unteraufgaben (Eltern \u203a Sub) nicht
    xrefPhrases(id).forEach(p => {
      const k = p.toLowerCase();
      const arr = XREF.map.get(k) || [];
      if (!arr.some(t => t.id === id)) arr.push({ id });
      XREF.map.set(k, arr);
    });
  });
  const alts = [...XREF.map.keys()]
    .sort((a, b) => b.length - a.length)
    .map(p => p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  XREF.re = alts.length
    ? new RegExp('(^|[^' + XW + '])(' + alts.join('|') + ')(?![' + XW + '])', 'gi')
    : null;
}

function xrefOwnerId(note){
  // Die Notiz ist Geschwister (nicht Kind) ihres [data-id]-Kopfes -> naechste
  // vorangehende [data-id] beim Aufsteigen aus den Wrappern (.parent, .fnote, .subs).
  // Manche Koepfe (Bericht-Ereignis, erledigtes Fokus-Eltern) sind bewusst NICHT
  // [data-id] (das waere global klickbar/verlinkbar), sondern tragen nur den
  // read-only Owner-Marker data-xowner -> hier zusaetzlich akzeptieren.
  // Am Pane-Rand abbrechen (Guertel und Hosentraeger): sonst griffe der Walk bei
  // einer Notiz ohne erreichbaren [data-id]/[data-xowner]-Kopf im eigenen Pane auf
  // die erste Zeile eines FREMDEN Panes als Owner durch.
  let el = note;
  while (el && el.id !== 'content'){
    if (el.classList && el.classList.contains('pane')) return '';
    let sib = el.previousElementSibling;
    while (sib){
      if (sib.matches && sib.matches('[data-id],[data-xowner]'))
        return sib.dataset.id || sib.dataset.xowner || '';
      const inner = sib.querySelector && sib.querySelector('[data-id],[data-xowner]');
      if (inner) return inner.dataset.id || inner.dataset.xowner || '';
      sib = sib.previousElementSibling;
    }
    el = el.parentElement;
  }
  return '';
}

function xrefSuppressed(){
  const set = new Set();
  const cnt = new Map();
  const all = LINKREG.concat(xrefLocalDismissed());   // xrefLocalDismissed: Task 7
  all.forEach(e => {
    const k = (e.phrase || '').toLowerCase();
    set.add((e.id || '') + '' + k);
    const ids = cnt.get(k) || new Set(); ids.add(e.id); cnt.set(k, ids);
  });
  const global = new Set();
  cnt.forEach((ids, k) => { if (ids.size >= 3) global.add(k); });
  return { pair: set, global };
}

function linkifyNotes(){
  document.querySelectorAll('#content .note .xref').forEach(s => {
    s.replaceWith(document.createTextNode(s.textContent));
  });
  document.querySelectorAll('#content .note').forEach(n => n.normalize());
  if (!XREF.re) return;
  const sup = xrefSuppressed();
  document.querySelectorAll('#content .note').forEach(note => {
    if (note.classList.contains('pub')) return;
    if (note.closest('.mdfield') || note.isContentEditable) return;
    const src = xrefOwnerId(note);
    const walker = document.createTreeWalker(note, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(tn => {
      const text = tn.nodeValue;
      XREF.re.lastIndex = 0;
      let mm, last = 0, frag = null;
      while ((mm = XREF.re.exec(text)) !== null) {
        const phrase = mm[2], k = phrase.toLowerCase();
        const targets = (XREF.map.get(k) || []).filter(t => t.id !== src);
        if (!targets.length || sup.global.has(k) ||
            sup.pair.has(src + '' + k)) continue;
        frag = frag || document.createDocumentFragment();
        const start = mm.index + mm[1].length;
        frag.appendChild(document.createTextNode(text.slice(last, start)));
        const sp = document.createElement('span');
        sp.className = 'xref';
        sp.dataset.xtgt = targets[0].id;
        sp.dataset.xphrase = phrase;
        sp.textContent = phrase;
        sp.onclick = ev => { ev.stopPropagation(); xrefOpen(sp); };  // xrefOpen: Task 6
        frag.appendChild(sp);
        last = start + phrase.length;
      }
      if (frag) {
        frag.appendChild(document.createTextNode(text.slice(last)));
        tn.replaceWith(frag);
      }
    });
  });
}
// Vorschau-Karte mit Sprung (Task 6). xrefOpen fuellt und zeigt #xrefview.
function xrefRowById(id){
  // Ziel-Titel kommt (Fokus + Struktur) mehrfach im DOM vor -> die Zeile im aktiven
  // Pane bevorzugen, damit der Sprung im gerade sichtbaren Kontext landet; sonst die erste.
  const rows = [...document.querySelectorAll('#content [data-id]')].filter(r => r.dataset.id === id);
  if (!rows.length) return null;
  const act = rows.find(r => { const p = r.closest('.pane'); return p && p.classList.contains('active'); });
  return act || rows[0];
}

function xrefOpen(sp){
  const phrase = sp.dataset.xphrase || sp.textContent;
  const src = xrefOwnerId(sp.closest('.note'));
  const targets = (XREF.map.get(phrase.toLowerCase()) || []).filter(t => t.id !== src);
  if (!targets.length) return;
  const body = document.getElementById('xrefbody');
  body.innerHTML = '';
  targets.forEach(t => {
    const row = xrefRowById(t.id);
    const d = row ? row.dataset : {};
    const chk = row && row.querySelector('input[type="checkbox"]');
    const done = (chk && chk.checked) || (row && row.dataset.done === '1');
    const meta = [d.area || '', d.due ? 'f\u00e4llig ' + d.due.replace('T', ' ') : '', done ? 'erledigt' : '']
      .filter(Boolean).join(' \u00b7 ');
    let noteTxt = '';
    try { noteTxt = JSON.parse(d.note || '""'); } catch (e) {}
    const card = document.createElement('div');
    card.innerHTML =
      '<button type="button" class="xref-ziel"><strong></strong></button>' +
      '<div class="xref-meta"></div><div class="xref-note"></div>';
    card.querySelector('strong').textContent = t.id;
    card.querySelector('.xref-meta').textContent = meta;
    card.querySelector('.xref-note').textContent = (noteTxt || '').slice(0, 220);
    card.querySelector('button').onclick = () => xrefJump(t.id);
    body.appendChild(card);
  });
  document.getElementById('xrefno').onclick = () => xrefDismiss(src, phrase);
  document.getElementById('xrefview').style.display = 'block';
}

function xrefClose(){
  document.getElementById('xrefview').style.display = 'none';
}

function xrefJump(id){
  const row = xrefRowById(id);
  if (!row) { xrefClose(); return; }
  const pane = row.closest('.pane');
  if (pane && !pane.classList.contains('active')){
    const tab = document.querySelector('.tab[data-pane="' + pane.id + '"]');
    if (tab) switchTab(tab);
  }
  let el = row.parentElement;
  while (el){ if (el.tagName === 'DETAILS') el.open = true; el = el.parentElement; }
  if (row.offsetParent === null && typeof applyFilter === 'function') applyFilter('');
  markSelected(row);
  if (row.scrollIntoView) row.scrollIntoView({ block: 'center' });
  xrefClose();
}

function xrefDismiss(srcId, phrase){
  if (!srcId) { xrefClose(); return; }        // kein Owner ermittelbar -> nichts senden/merken, kein Phantom-Paar
  const loc = xrefLocalDismissed();
  if (!loc.some(e => e.id === srcId && e.phrase === phrase)) {
    loc.push({ id: srcId, phrase: phrase });
    localStorage.setItem('xrefDismissLocal', JSON.stringify(loc));
  }
  sendOrQueue({ id: _newSubId(), linkDismiss: [{ id: srcId, phrase: phrase }] });
  xrefClose();
  linkifyNotes();
  toast('Verweis gel\u00f6st');
}
function xrefLocalDismissed(){
  try { return JSON.parse(localStorage.getItem('xrefDismissLocal') || '[]'); }
  catch (e) { return []; }
}
function b64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);

function listSearch(q){
  q = (q || '').trim().toLowerCase();
  const content = document.getElementById('content');
  if (!content) return;
  const match = el => !q || (el.dataset.text || '').toLowerCase().includes(q);
  // Struktur: einzelne Karten aus-/einblenden
  content.querySelectorAll('details.grp [data-text]').forEach(r => r.classList.toggle('nomatch', !match(r)));
  // Fokus: Eltern-Einheit als Ganzes (sichtbar, wenn irgendein ToDo darin passt)
  content.querySelectorAll('.focusparent').forEach(p => {
    const hit = !q || [...p.querySelectorAll('[data-text]')].some(match);
    p.classList.toggle('nomatch', !hit);
  });
  // Struktur-Gruppen ohne Treffer ausblenden (Bereiche UND Themen-Untergruppen)
  content.querySelectorAll('details.grp, details.tgrp').forEach(g => {
    const hit = !q || g.querySelector('[data-text]:not(.nomatch)');
    g.classList.toggle('nomatch', !hit);
  });
  // Gruppen mit Treffern aufklappen; nur die VON DER SUCHE geoeffneten (data-sopen)
  // wieder schliessen -- vom User selbst geoeffnete bleiben offen (Muster wie
  // data-reclose beim Drucken).
  content.querySelectorAll('details.grp, details.tgrp').forEach(g => {
    const hit = q && !g.classList.contains('nomatch');
    if (hit && !g.open){ g.dataset.sopen = '1'; g.open = true; }
    else if (!hit && g.dataset.sopen){ g.open = false; delete g.dataset.sopen; }
  });
  highlightMatches(content, q);
}
function highlightMatches(content, q){
  // alte Markierungen entfernen
  content.querySelectorAll('mark.shl').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  content.querySelectorAll('.txt').forEach(t => t.normalize());
  if (!q) return;
  content.querySelectorAll('[data-text]:not(.nomatch) .txt').forEach(txt => {
    [...txt.childNodes].forEach(node => {
      if (node.nodeType !== 3) return;
      const s = node.nodeValue, low = s.toLowerCase();
      let i = low.indexOf(q);
      if (i < 0) return;
      const frag = document.createDocumentFragment();
      let last = 0;
      while (i >= 0){
        frag.appendChild(document.createTextNode(s.slice(last, i)));
        const m = document.createElement('mark');
        m.className = 'shl';
        m.textContent = s.slice(i, i + q.length);
        frag.appendChild(m);
        last = i + q.length;
        i = low.indexOf(q, last);
      }
      frag.appendChild(document.createTextNode(s.slice(last)));
      node.replaceWith(frag);
    });
  });
}

function brcApply(){

function brcQuick(kind){
  var now = new Date();
  var heute = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var von;
  if (kind === 'week'){ var dow = (heute.getDay() + 6) % 7; von = new Date(heute); von.setDate(heute.getDate() - dow); }
  else if (kind === 'month'){ von = new Date(heute.getFullYear(), heute.getMonth(), 1); }
  else { von = new Date(heute); von.setDate(heute.getDate() - (kind - 1)); }
  var v = document.getElementById('brc-von'), b = document.getElementById('brc-bis');
  if (!v || !b) return;
  v.value = brcIso(von); b.value = brcIso(heute);
  brcApply();
}

let WIKI = null;        // key -> record, nur im Speicher (KEIN localStorage = Klartext-Schutz)
let WIKI_STACK = [];    // Navigations-/Zurück-Stack der Notiz-Keys
let _wikiLoad = null;   // In-Flight-Guard: laufender ensureWiki-Ladevorgang
function wesc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function ensureWiki(){
  if (WIKI) return true;
  if (_wikiLoad) return _wikiLoad;
  const body = document.getElementById('wikibody');
  body.innerHTML = '<p class="wmsg">Wiki wird geladen\u2026</p>';
  _wikiLoad = (async () => {
    try {
      let raw, offline = false;
      try {
        const r = await fetch('wiki.enc.json?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) throw new Error('fetch');
        raw = await r.json();
        cacheBlob('encWiki', raw);
      } catch(netErr) {
        raw = loadBlob('encWiki');
        if (!raw) throw netErr;
        offline = true;
      }
      const arr = JSON.parse(await decryptPayload(raw, PIN));
      WIKI = {};
      arr.forEach(n => { WIKI[n.key] = n; });
      if (offline) toast('offline \u2013 letzter Stand');
      return true;
    } catch(e) {
      WIKI = null;
      body.innerHTML = '<p class="wmsg">Wiki konnte nicht geladen werden. '
        + '<button class="wretry" onclick="openWiki()">Erneut versuchen</button></p>';

async function openWiki(){

function showNote(key, push){

function _wikiPlain(n){
  if (n.plain === undefined){
    const d = document.createElement('div');
    d.innerHTML = n.html;
    n.plain = (d.textContent || '').replace(/\s+/g, ' ').trim();
  }
  return n.plain;
}
function _wikiSnippet(n, q){
  const plain = _wikiPlain(n);
  const idx = plain.toLowerCase().indexOf(q);
  if (idx < 0) return '';
  const start = Math.max(0, idx - 60), end = Math.min(plain.length, idx + q.length + 100);
  return (start > 0 ? '\u2026' : '') + wesc(plain.slice(start, idx))
    + '<mark>' + wesc(plain.slice(idx, idx + q.length)) + '</mark>'
    + wesc(plain.slice(idx + q.length, end)) + (end < plain.length ? '\u2026' : '');
}
function wikiSearch(q){

async function wbSync(){

function wbDatedEntry(){
  const ti = document.getElementById('wb-title');
  const title = (ti.value || '').trim();
  const header = '**' + localStampDe() + (title ? ' — ' + title : '') + '**';
  const old = noteGet('wb-note');
  noteSet('wb-note', header + '\n\n' + (old || ''));   // immer Leerzeile als sauberer Tippstart
  ti.value = '';
  const { ce } = _noteFields('wb-note');
  if (ce){
    ce.focus();
    // Caret in den 2. Block (die Leerzeile nach dem Datum-Kopf) -> nicht im fetten Kopf tippen
    const target = ce.children.length > 1 ? ce.children[1] : ce.lastElementChild;
    if (target){
      const sel = ce.ownerDocument.getSelection();
      const range = ce.ownerDocument.createRange();
      range.selectNodeContents(target); range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
    }
    try {
      const d = ce.ownerDocument;
      if (d.queryCommandState && d.queryCommandState('bold')) d.execCommand('bold');
      if (d.queryCommandState && d.queryCommandState('italic')) d.execCommand('italic');
    } catch(e){}
    ceSyncToolbar('wb-note');
  }
  wbInput();
}
let _wbConvNodes = null;
function _wbIsDateBlock(el){
  // Datum-Kopf = Block, dessen einziger Inhalt fett ist (deckungsgleich mit der CSS-Regel
  // '#wb-note p:has(> strong:only-child)' in render._FRAGMENT_CSS -> bei Aenderung beide anpassen).
  if (!el || el.nodeType !== 1) return false;
  const s = el.querySelector(':scope > strong');
  return !!s && el.textContent.trim() === s.textContent.trim();
}
function _wbTopBlock(node, ce){           // direktes Kind-Block von ce
  while (node && node.parentNode && node.parentNode !== ce) node = node.parentNode;
  return (node && node.parentNode === ce) ? node : null;
}
function _wbEntryNodes(ce, start){        // start + Folgegeschwister bis zum naechsten Datum-Kopf
  if (!start) return [];
  const nodes = [start];
  let n = start.nextElementSibling;
  while (n && !_wbIsDateBlock(n)) { nodes.push(n); n = n.nextElementSibling; }
  return nodes;
}
function _wbEntryMarkdown(ce, nodes){     // Markdown der gesammelten Knoten
  const tmp = ce.ownerDocument.createElement('div');
  nodes.forEach(x => tmp.appendChild(x.cloneNode(true)));
  return editableToMd(tmp);
}
function wbToTodo(){
  const { ce } = _noteFields('wb-note');
  if (!ce) return;
  const sel = ce.ownerDocument.getSelection();
  let start = (sel && sel.anchorNode && ce.contains(sel.anchorNode))
    ? _wbTopBlock(sel.anchorNode, ce) : ce.firstElementChild;
  const nodes = _wbEntryNodes(ce, start);
  if (!nodes.length) { toast('nichts zu \u00fcberf\u00fchren'); return; }
  const lines = _wbEntryMarkdown(ce, nodes).split('\n');
  let i = 0;
  while (i < lines.length && (lines[i].trim() === '' || /^\*\*.*\*\*$/.test(lines[i].trim()))) i++;
  const textLine = i < lines.length ? lines[i].replace(/^\s*[-*]\s+/, '').trim() : '';
  if (!textLine) { toast('Keine Zeile zum \u00dcberf\u00fchren'); return; }
  const note = lines.slice(i + 1).filter(l => l.trim() !== '').join('\n');
  openNew();
  _wbConvNodes = nodes;
  document.getElementById('nw-text').value = textLine;
  if (note) noteSet('nw-note', note);
  const av = document.getElementById('nw-area'); if (av) av.focus();
}
function wbApplyRemoval(){
  if (!_wbConvNodes) return;
  const nodes = _wbConvNodes; _wbConvNodes = null;
  nodes.forEach(x => { if (x && x.parentNode) x.parentNode.removeChild(x); });
  wbInput();
}
async function openWhiteboard(){
  // Nach Reload ist das Feld leer: lokalen Entwurf (wbCache) wieder einsetzen,
  // damit ungesyncte Offline-Eintraege sichtbar bleiben.
  if (!noteGet('wb-note')) { const c = loadBlob('wbCache'); if (c) noteSet('wb-note', c); }
  const queuedWb = loadQ().some(s => s.whiteboard !== undefined);
  if (WB_DIRTY || queuedWb) return;
  let text = null;
  try {
    const r = await fetch('whiteboard.enc.json?t=' + Date.now(), { cache:'no-store' });
    if (!r.ok) throw new Error('fetch');
    const raw = await r.json();
    cacheBlob('encWhiteboard', raw);
    text = JSON.parse(await decryptPayload(raw, PIN));
  } catch(e) {
    const raw = loadBlob('encWhiteboard');
    if (raw) { try { text = JSON.parse(await decryptPayload(raw, PIN)); } catch(_){} }
    if (text === null) { const c = loadBlob('wbCache'); if (c !== null && c !== undefined) text = c; }
  }
  if (text !== null && text !== undefined) { noteSet('wb-note', text); cacheBlob('wbCache', text); }
}
function localStampSv(){ const d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
function randHex(nbytes){
  const a = new Uint8Array(nbytes); crypto.getRandomValues(a);
  return [...a].map(b => b.toString(16).padStart(2,'0')).join('');
}
function randSecret(){
  const a = new Uint8Array(16); crypto.getRandomValues(a);
  let s = btoa(String.fromCharCode.apply(null, a));
  return s.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/=+$/,'');
}
function randCode(){
  const a = new Uint32Array(1); crypto.getRandomValues(a);
  return String(a[0] % 1000000).padStart(6,'0');
}
async function shareCreateSubmit(){
  const label = (document.getElementById('sh-label').value || '').trim();
  const nb = document.getElementById('sh-notebook').value;
  const scopes = [...document.querySelectorAll('#sh-areas input:checked')]
    .map(c => ({ notebook: nb, area: c.value }));
  if (!scopes.length){ toast('Bitte mindestens einen Bereich wählen'); return; }
  const entry = {
    token: randHex(8), link_secret: randSecret(), code: randCode(),
    label: label, scopes: scopes, active: true, created: localStampSv()
  };
  if (!SHARES_DATA) SHARES_DATA = { base_url: '', shares: [] };
  SHARES_DATA.shares.unshift(entry);     // optimistisch
  renderShares(SHARES_DATA);
  const res = document.getElementById('sh-result');
  res.innerHTML = '<div>Link: ' + wesc(shareLink(entry)) + '</div>'
    + '<div>Code: ' + wesc(entry.code) + '</div>'
    + '<div>(f\u00fcr die eingeladene Person erst nach dem n\u00e4chsten Sync nutzbar)</div>';
  document.getElementById('sh-label').value = '';
  document.querySelectorAll('#sh-areas input:checked').forEach(inp => { inp.checked = false; });
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), shareOps: [{
    op: 'create', token: entry.token, link_secret: entry.link_secret, code: entry.code,
    label: entry.label, scopes: entry.scopes }] });
}
function _shareFind(token){ return (SHARES_DATA && SHARES_DATA.shares || []).find(s => s.token === token); }
async function shareRevoke(token){
  const s = _shareFind(token); if (s) s.active = false;
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'revoke', token: token }] });
}
async function shareRemoveScope(token, notebook, area){
  const s = _shareFind(token);
  if (s) s.scopes = (s.scopes||[]).filter(sc => !(sc.notebook === notebook && sc.area === area));
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'removeScope', token: token, notebook: notebook, area: area }] });
}
async function shareExtendScope(token, area){
  if (!area) return;
  const s = _shareFind(token); if (!s) return;
  if (!s.scopes) s.scopes = [];
  const nb = (s.scopes[0] && s.scopes[0].notebook) || 'Privat';
  s.scopes.push({ notebook: nb, area: area });
  renderShares(SHARES_DATA);
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    shareOps: [{ op: 'extend', token: token, notebook: nb, area: area }] });
}

function shareLink(s){
  const base = (SHARES_DATA && SHARES_DATA.base_url) || '';
  return base ? base + '#' + s.token + '.' + s.link_secret : '#' + s.token + '.' + s.link_secret;

function renderShares(data){
  const body = document.getElementById('sharesbody');
  const list = (data && data.shares) || [];
  if (!list.length){ body.innerHTML = '<p class="wmsg">Noch keine Freigaben.</p>'; return; }
  // Werte (Token/Bereich) wandern ueber data-*-Attribute + delegierte Listener, nicht in
  // onclick-Strings -- so brechen Ordnernamen mit Apostroph die Handler nicht (wesc escaped kein ').
  body.innerHTML = list.map(s => {
    const tok = wesc(s.token);
    const scopes = (s.scopes||[]).map(sc =>
      '<span class="sh-scope">' + wesc(areaLabel(sc.area)) +
      ' <button class="sh-rmscope" data-token="' + tok + '" data-notebook="' + wesc(sc.notebook) +
      '" data-area="' + wesc(sc.area) + '" title="Bereich entfernen">\u00d7</button></span>').join('');
    const nb = (s.scopes[0] && s.scopes[0].notebook) || 'Privat';
    const have = new Set((s.scopes||[]).map(sc => sc.area));
    const addable = knownAreas(nb).filter(a => !have.has(a));
    const addSel = addable.length
      ? '<select class="sh-addscope" data-token="' + tok + '">'
        + '<option value="">+ Bereich\u2026</option>'
        + addable.map(a => '<option value="' + wesc(a) + '">' + wesc(areaLabel(a)) + '</option>').join('')
        + '</select>'
      : '';
    const code = wesc(s.code || '');
    return '<div class="shrow' + (s.active ? '' : ' revoked') + '" data-token="' + tok + '">'
      + '<div><b>' + wesc(s.label || '(ohne Label)') + '</b>'
      + (s.active ? '' : ' \u2014 widerrufen') + '</div>'
      + '<div class="sh-link" onclick="copyText(this.textContent)">' + wesc(shareLink(s)) + '</div>'
      + '<div>Code: <span class="sh-code">' + code.slice(0,3) + ' ' + code.slice(3) + '</span></div>'
      + '<div class="sh-scopes">' + scopes + addSel + '</div>'
      + (s.active ? '<button class="sh-act sh-revoke" data-token="' + tok + '">Widerrufen</button>' : '')
      + '</div>';
  }).join('');
}

let attUrl = null;
let attCur = null;         // { bytes, name, mime } des geoeffneten Anhangs
function attViewClose(){

function attFile(){

async function openAtt(chip){
  if (!chip.dataset.att){
    toast(chip.classList.contains('pend') ? 'Anhang wartet auf den PC' : 'Datei fehlt am PC');
    return;
  }
  try {
    const r = await fetch(chip.dataset.att + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    const obj = JSON.parse(await decryptPayload(await r.json(), PIN));
    const bytes = Uint8Array.from(atob(obj.data), c => c.charCodeAt(0));
    attViewClose();
    attCur = { bytes: bytes, name: obj.name || 'anhang',
               mime: obj.mime || 'application/octet-stream' };
    attUrl = URL.createObjectURL(new Blob([bytes], { type: attCur.mime }));
    // Viewer als Aktionsblatt fuer BEIDE Typen: Bild wird angezeigt, PDF zeigt
    // nur Name + Aktionen (Oeffnen/Teilen); Drucken direkt nur fuer Bilder.
    const isImg = attCur.mime.startsWith('image/');
    const img = document.getElementById('attimg');
    img.style.display = isImg ? '' : 'none';
    if (isImg) img.src = attUrl;
    document.getElementById('attname').textContent = attCur.name;
    document.getElementById('att-print').style.display = isImg ? '' : 'none';
    const teilbar = navigator.canShare && navigator.canShare({ files: [attFile()] });
    document.getElementById('att-share').textContent = teilbar ? 'Teilen' : 'Herunterladen';
    document.getElementById('attview').style.display = 'flex';
  } catch(e){ toast('Anhang noch nicht am PC angekommen'); }
}
function attOpenTab(){

async function shareAtt(){
  if (!attCur) return;
  const f = attFile();
  if (navigator.canShare && navigator.canShare({ files: [f] })){
    // System-Teilen-Menue: Mail, Messenger, Druckdienst - Datei verlaesst damit
    // bewusst die verschluesselte Umgebung (Nutzerentscheidung).
    try { await navigator.share({ files: [f], title: attCur.name }); }
    catch(e){ /* vom Nutzer abgebrochen */ }
  } else {
    const a = document.createElement('a');
    a.href = attUrl; a.download = attCur.name;
    document.body.appendChild(a); a.click(); a.remove();
    toast('Heruntergeladen');
  }
}
function printAtt(){
  if (!attUrl || !attCur || !attCur.mime.startsWith('image/')) return;
  const fr = document.createElement('iframe');
  fr.style.position = 'fixed'; fr.style.right = '100%'; fr.style.bottom = '100%';
  document.body.appendChild(fr);
  const d = fr.contentDocument;
  d.open();
  d.write('<img src="' + attUrl + '" style="max-width:100%" '
    + 'onload="setTimeout(function(){window.focus();window.print();},60)">');
  d.close();
  setTimeout(function(){ fr.remove(); }, 60000);
}
function cacheBlob(key, obj){ try { localStorage.setItem(key, JSON.stringify(obj)); } catch(_){} }
function loadBlob(key){ try { return JSON.parse(localStorage.getItem(key)); } catch(_){ return null; } }
async function fetchPayload(){
  const r = await fetch('todos.enc.json?t=' + Date.now(), { cache:'no-store' });
  if (!r.ok) throw new Error('fetch');
  return await r.json();
}
async function decryptPayload(p, pin){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(p.salt), iterations:p.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(p.iv) }, key, b64(p.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const pin = document.getElementById('pin').value;
  const err = document.getElementById('err'); err.textContent = '';
  let offline = false;
  try {
    let payload;
    try {
      payload = await fetchPayload();
      cacheBlob('encTodos', payload);
    } catch(netErr) {
      payload = loadBlob('encTodos');
      if (!payload) throw netErr;
      offline = true;
    }
    const env = parseEnvelope(await decryptPayload(payload, pin));
    PIN = pin;
    INBOX = env.inbox || null;
    LAST_RENDERED = env.renderedAt || null;
    document.getElementById('content').innerHTML = env.html;
    applyPending();
    LINKREG = env.linkreg || [];
    xrefBuildVocab();
    linkifyNotes();
    updateAufraeumBadge();
    updateZuarbeitBadge();
    brcInit();
    updatePcStatus();
    syncEditorView();
    applyDueTimes();
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.body.classList.add('unlocked');
    applyFilter(localStorage.getItem('todoFilter') || '');
    if (offline) toast('offline \u2013 letzter Stand');
    flushQueue();
    flushAttQueue();
  } catch (e) {
    err.textContent = 'Falsche PIN oder keine Verbindung';
  }
}

async function refresh(){
  if (PIN === null) return;
  try {
    // Gemerkte ("Speichern"), aber noch nicht gesendete Aenderungen NICHT verwerfen:
    // erst an den PC senden, sonst gingen sie beim Neuladen verloren ("nachgetragenes
    // verschwindet"). submitChanges sendet {done,reopen,edits} und leert EDITS selbst.
    if (Object.keys(EDITS).length) await submitChanges();
    const payload = await fetchPayload();
    cacheBlob('encTodos', payload);
    const env = parseEnvelope(await decryptPayload(payload, PIN));
    INBOX = env.inbox || INBOX;
    LAST_RENDERED = env.renderedAt || null;
    Object.keys(EDITS).forEach(k => delete EDITS[k]);
    document.getElementById('content').innerHTML = env.html;
    applyPending();
    LINKREG = env.linkreg || [];
    xrefBuildVocab();
    linkifyNotes();
    updateAufraeumBadge();
    updateZuarbeitBadge();
    brcInit();
    updatePcStatus();
    const qel = document.getElementById('q'); if (qel) qel.value = '';
    syncEditorView();
    applyDueTimes();
    document.getElementById('fallback').style.display = 'none';
    const at = document.querySelector('.tab.active');
    if (at && at.dataset.pane === 'wiki' && WIKI && WIKI_STACK.length) {
      showNote(WIKI_STACK[WIKI_STACK.length - 1], false);
    }
    toast('aktualisiert');
    checkShellUpdate();
    reconcile();
  } catch (e) {
    toast('Fehler beim Aktualisieren: ' + ((e && (e.name + (e.message ? ' ' + e.message : ''))) || e));
  }
}
// Pull-to-Refresh: eigene Wisch-Geste -> refresh() (KEIN Reload, bleibt angemeldet)
let pullStartY = null, pullDist = 0;
const PULL_THRESHOLD = 70;
window.addEventListener('touchstart', e => {
  pullStartY = (PIN !== null && window.scrollY <= 0) ? e.touches[0].clientY : null;
  pullDist = 0;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (pullStartY === null) return;
  pullDist = e.touches[0].clientY - pullStartY;
  const ind = document.getElementById('pull');
  if (pullDist > 0 && window.scrollY <= 0) {
    ind.style.height = Math.min(pullDist, 90) + 'px';
    ind.textContent = pullDist > PULL_THRESHOLD ? '\u2193 Loslassen zum Aktualisieren' : '\u2193 Ziehen zum Aktualisieren';
  } else {
    ind.style.height = '0px';
  }
}, { passive: true });
window.addEventListener('touchend', () => {
  if (pullStartY === null) return;
  document.getElementById('pull').style.height = '0px';
  const trigger = pullDist > PULL_THRESHOLD;
  pullStartY = null; pullDist = 0;
  if (trigger) refresh();
}, { passive: true });

function mdEsc(s){ return (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function mdInline(s){
  return s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>');
}
function mdPreview(src){
  const lines = (src || '').split('\n');
  let html = '', inList = false;
  function closeList(){ if (inList){ html += '</ul>'; inList = false; } }
  for (const raw of lines){
    const line = mdEsc(raw);
    let m;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))){
      closeList();
      const n = m[1].length;
      html += '<h' + n + '>' + mdInline(m[2]) + '</h' + n + '>';
    } else if ((m = line.match(/^[-*]\s+(.*)$/))){
      if (!inList){ html += '<ul>'; inList = true; }
      html += '<li>' + mdInline(m[1]) + '</li>';
    } else if (line.trim() === ''){
      closeList();
    } else {
      closeList();
      html += '<p>' + mdInline(line) + '</p>';
    }
  }
  closeList();
  return html;
}
function mdToEditable(md){
  const lines = (md || '').split('\n');

  const closeList = () => { if (inList){ html += '</ul>'; inList = false; } };
  for (const raw of lines){
    const line = mdEsc(raw);
    let m;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))){
      closeList(); const n = m[1].length;
      html += '<h' + n + '>' + mdInline(m[2]) + '</h' + n + '>';
    } else if ((m = line.match(/^[-*]\s+(.*)$/))){
      if (!inList){ html += '<ul>'; inList = true; }
      html += '<li>' + mdInline(m[1]) + '</li>';
    } else if (line.trim() === ''){
      closeList(); html += '<p><br></p>';
    } else {
      closeList(); html += '<p>' + mdInline(line) + '</p>';
    }
  }
  closeList();
  return html || '<p><br></p>';
}
// Emphasis kanonisch setzen: Leerraum/Umbrueche (z. B. das vom Browser in den Fettdruck
// gezogene <br>) gehoeren VOR/HINTER die Marker, nicht hinein. Sonst serialisiert ein vom
// Browser umstrukturierter DOM ('**Datum\n**Text') anders als der saubere ('**Datum**\nText')
// -> jede Editor-Beruehrung erzeugt eine Phantom-Aenderung (Karte bleibt "wartet").
function ceWrap(inner, mark){
  const m = inner.match(/^(\s*)([\s\S]*?)(\s*)$/);
  return m[2] ? (m[1] + mark + m[2] + mark + m[3]) : (m[1] + m[3]);
}
function ceInline(node){
  let md = '';
  node.childNodes.forEach(n => {
    if (n.nodeType === 3){ md += n.nodeValue; return; }
    if (n.nodeType !== 1) return;
    const tag = n.nodeName.toLowerCase();
    if (tag === 'br'){ md += '\n'; return; }
    const inner = ceInline(n);
    const st = (n.getAttribute && n.getAttribute('style')) || '';
    if (tag === 'strong' || tag === 'b' || /font-weight:\s*(bold|[6-9]00)/.test(st)) md += ceWrap(inner, '**');
    else if (tag === 'em' || tag === 'i' || /font-style:\s*italic/.test(st)) md += ceWrap(inner, '*');
    else if (tag === 'code') md += '`' + inner + '`';
    else md += inner;
  });
  return md;
}
function _isBlockTag(t){ return /^(div|p|ul|ol|h[1-6]|li)$/.test(t); }
function editableToMd(root){
  const blocks = [];
  let cur = null;                       // offene Inline-Zeile
  const open = () => { if (cur === null) cur = ''; };
  const flush = () => { if (cur !== null){ blocks.push(cur); cur = null; } };
  function walk(parent){
    parent.childNodes.forEach(node => {
      if (node.nodeType === 3){ open(); cur += node.nodeValue; return; }
      if (node.nodeType !== 1) return;
      const tag = node.nodeName.toLowerCase();
      if (tag === 'br'){ open(); flush(); open(); return; }
      if (!_isBlockTag(tag)){ open(); cur += ceInline(node); return; }
      flush();
      if (tag === 'ul' || tag === 'ol'){
        node.querySelectorAll(':scope > li').forEach(li => blocks.push('- ' + ceInline(li).trim()));
      } else if (/^h[1-6]$/.test(tag)){
        const n = Math.min(3, parseInt(tag[1], 10));
        blocks.push('#'.repeat(n) + ' ' + ceInline(node).trim());
      } else {
        const hasBlockChild = [...node.childNodes].some(c => c.nodeType === 1 && _isBlockTag(c.nodeName.toLowerCase()));
        if (hasBlockChild) walk(node);
        else blocks.push(ceInline(node).replace(/\n+$/, ''));
      }
    });
  }
  walk(root);
  flush();
  while (blocks.length && blocks[blocks.length - 1].trim() === '') blocks.pop();
  return blocks.join('\n');
}
function isWysiwygSafe(md){

function noteSync(id){

function mdWrap(id, before, after){
  const t = document.getElementById(id);
  if (!t) return;
  const s = t.selectionStart, e = t.selectionEnd, v = t.value;
  const sel = v.slice(s, e);
  t.value = v.slice(0, s) + before + sel + after + v.slice(e);
  const pos = s + before.length + sel.length;
  t.focus(); t.setSelectionRange(pos, pos);
  noteSync(id);

function mdLinePrefix(id, prefix, oneLine){
  const t = document.getElementById(id);
  if (!t) return;
  const s = t.selectionStart, e = t.selectionEnd, v = t.value;
  const lineStart = v.lastIndexOf('\n', s - 1) + 1;
  let lineEnd = v.indexOf('\n', oneLine ? s : e);
  if (lineEnd === -1) lineEnd = v.length;
  const block = v.slice(lineStart, lineEnd);
  const prefixed = block.split('\n').map(l => prefix + l).join('\n');
  t.value = v.slice(0, lineStart) + prefixed + v.slice(lineEnd);
  const np = lineStart + prefixed.length;
  t.focus(); t.setSelectionRange(np, np);

}

function dueBadgeParts(due){
  // Relative Faelligkeit ggue. GERAETE-Datum: der Daten-Blob kann tagelang alt sein
  // (PC aus, nichts geaendert) -> Server-gerendertes "heute/ueberfaellig" veraltet.
  // Der Client rechnet deshalb selbst und ueberschreibt die Badge-Texte.
  const now = new Date();
  const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const d = new Date(+due.slice(0,4), +due.slice(5,7)-1, +due.slice(8,10));
  const days = Math.round((d - t0) / 86400000);
  const tm = due.indexOf('T') >= 0 ? ' ' + due.slice(11) : '';
  const short = due.slice(8,10) + '.' + due.slice(5,7) + '.';
  if (days < 0)  return { txt:'\u00fcberf\u00e4llig ' + (-days) + ' T \u00b7 ' + short + tm, soon:true, over:true };
  if (days === 0) return { txt:'heute f\u00e4llig' + tm, soon:true, over:dueDateTimePast(due) };
  if (days === 1) return { txt:'morgen' + tm, soon:false, over:false };
  if (days <= 60) return { txt:'in ' + days + ' T \u00b7 ' + short + tm, soon:false, over:false };
  return { txt:'@' + short + due.slice(0,4) + tm, soon:false, over:false };
}
function dueBadgeHtml(due){

}
function fmtDue(due){ return (due || '').replace('T', ' '); }
function dueDateTimePast(due){
  // nur mit Uhrzeit relevant; "YYYY-MM-DDTHH:MM" wird als LOKALE Zeit interpretiert
  if (!due || due.indexOf('T') < 0) return false;
  const ts = Date.parse(due);
  return !isNaN(ts) && ts < Date.now();
}

function titleParts(text){
  // {topic, desc}. Topic = fuehrendes "..."/\u201e...\u201d (U+201E) irgendwo; gerades " mitten -> kein Topic.
  let m = text.match(/^\s*[\u201e\u201c"]([^\u201e\u201c\u201d"]+)["\u201c\u201d]/);
  if (!m) m = text.match(/\u201e([^\u201e\u201c\u201d"]+)["\u201c\u201d]/);
  if (m){
    const desc = text.slice(m.index + m[0].length).replace(/^[\s:\u2014-]+/, '').trim();
    return { topic: m[1].trim(), desc };
  }
  const p = text.match(/^.+?\s\u2014\s(.+)$/);
  return { topic: null, desc: (p ? p[1] : text).trim() };
}
function buildTitle(topic, desc){
  // Neue Form: "Topic": Beschreibung (gerade Anfuehrungszeichen + Doppelpunkt, kein Praefix).
  desc = (desc || '').trim();
  if (topic) return '"' + String(topic).trim() + '"' + (desc ? ': ' + desc : '');
  return desc;
}
function copyMetaHtml(item){
  const out = [];
  // Word ignoriert inline style="color" auf <span>, honoriert aber das Legacy-<font color>-Tag;
  // Gmail/Outlook rendern <font color> ebenfalls. Fett via <b> (zuverlaessiger als CSS in Word).
  const p = item.dataset.prio;
  if (p){
    const col = { hoch:'#dc2626', mittel:'#b45309', niedrig:'#0d9488' }[p];
    if (col) out.push('<font color="' + col + '"><b>Prio ' + wesc(p) + '</b></font>');
  }
  const due = item.dataset.due;
  if (due){
    const today = new Date().toISOString().slice(0, 10);
    const col = due < today ? '#dc2626' : '#6b7280';
    out.push('<font color="' + col + '">f\u00e4llig ' + wesc(due.replace('T',' ')) + '</font>');
  }
  return out.length ? ' ' + out.join(' \u00b7 ') : '';
}
function copyMetaText(item){
  const out = [];
  if (item.dataset.prio) out.push('Prio ' + item.dataset.prio);
  if (item.dataset.due) out.push('f\u00e4llig ' + item.dataset.due.replace('T',' '));
  return out.length ? ' (' + out.join(', ') + ')' : '';
}
function xrefFreeClone(node){
  // Kopien duerfen das interne span.xref-Markup nie verlassen (Klick-Verlinkung ist ein
  // Werkzeug des eigenen Schirms) -- klonen und die Spans zu reinem Text entpacken.
  const c = node.cloneNode(true);
  c.querySelectorAll('.xref').forEach(s => s.replaceWith(document.createTextNode(s.textContent)));
  return c;
}
function noteToCopyHtml(note){
  let h = '';
  [...note.children].forEach(ch => {
    if (ch.classList.contains('lentry')){
      const ts = ch.querySelector('.lts'), body = ch.querySelector('.lbody');
      if (ts) h += '<p><font color="#0d9488"><b>' + wesc(ts.textContent) + '</b></font></p>';
      if (body) h += '<blockquote>' + xrefFreeClone(body).innerHTML + '</blockquote>';
    } else {
      h += xrefFreeClone(ch).outerHTML;
    }
  });
  return h || xrefFreeClone(note).innerHTML;
}
function noteToCopyText(note){
  let t = '';
  [...note.children].forEach(ch => {
    if (ch.classList.contains('lentry')){
      const ts = ch.querySelector('.lts'), body = ch.querySelector('.lbody');
      if (ts) t += (t ? '\n' : '') + ts.textContent.trim();
      if (body){ const bt = body.innerText.trim();
        if (bt) t += '\n' + bt.split('\n').map(l => '    ' + l).join('\n'); }
    } else {
      const ct = (ch.innerText || '').trim();
      if (ct) t += (t ? '\n' : '') + ct;
    }
  });
  return t || note.innerText.trim();
}
function pubNote(parent){
  // gefilterte pub-Variante bevorzugen: interne Verweise (note_refs) bleiben am
  // eigenen Schirm, gehen aber NICHT in Kopien/Ausgaben
  return parent.querySelector(':scope > .note.pub') || parent.querySelector(':scope > .note');
}
function subNoteEl(s){
  const sn = s.nextElementSibling;
  if (!sn || !sn.classList.contains('note')) return null;
  if (sn.classList.contains('priv')){
    const pn = sn.nextElementSibling;
    return (pn && pn.classList.contains('pub')) ? pn : sn;
  }
  return sn;
}
function parentToHtml(parent){
  const head = parent.querySelector(':scope > .item');
  const title = head ? (head.dataset.text || (head.querySelector('.txt') ? head.querySelector('.txt').textContent.trim() : '')) : '';
  if (!title) return '';
  let h = '<p><font color="#0d9488"><b>' + wesc(title) + '</b></font></p>';
  const meta = copyMetaHtml(head);
  if (meta) h += '<p>' + meta.trimStart() + '</p>';   // Prio/Faellig auf eigener Zeile, nicht am Titel klebend
  const note = pubNote(parent);
  if (note) h += noteToCopyHtml(note);
  const subs = [...parent.querySelectorAll('.subs > .item.sub:not([data-done])')];
  if (subs.length){
    h += '<ul>';
    subs.forEach(s => {
      let li = wesc(s.dataset.text) + copyMetaHtml(s);
      const sn = subNoteEl(s);
      if (sn) li += xrefFreeClone(sn).innerHTML;
      h += '<li>' + li + '</li>';
    });
    h += '</ul>';
  }
  return h;
}
function parentToText(parent){
  const head = parent.querySelector(':scope > .item');
  const title = head ? (head.dataset.text || (head.querySelector('.txt') ? head.querySelector('.txt').textContent.trim() : '')) : '';
  if (!title) return '';
  let t = title + copyMetaText(head);
  const note = pubNote(parent);
  if (note){ const nt = noteToCopyText(note); if (nt) t += '\n' + nt; }
  const subs = [...parent.querySelectorAll('.subs > .item.sub:not([data-done])')];
  subs.forEach(s => {
    t += '\n- ' + s.dataset.text + copyMetaText(s);
    const sn = subNoteEl(s);
    if (sn){ const nt = sn.innerText.trim(); if (nt) t += '\n  ' + nt.replace(/\n/g, '\n  '); }
  });
  return t;
}
function writeRichClipboard(html, text){
  // Office-kompatibel: copy-Event + execCommand erzeugt sauberes CF_HTML (inkl. inline-Farben),
  // das Outlook/Word 2016/365 lesen. Die Async-Clipboard-API saniert text/html (verliert inline
  // style="color") und liefert CF_HTML, das aelteres Office als Klartext verwirft.
  const handler = (e) => {
    e.preventDefault();
    e.clipboardData.setData('text/html', html);
    e.clipboardData.setData('text/plain', text);
  };
  const sel = window.getSelection();
  const saved = [];
  for (let i = 0; i < sel.rangeCount; i++) saved.push(sel.getRangeAt(i));
  const dummy = document.createElement('span');
  dummy.textContent = '\u00a0';
  dummy.style.position = 'fixed'; dummy.style.left = '-9999px';
  document.body.appendChild(dummy);
  const range = document.createRange();
  range.selectNodeContents(dummy);
  sel.removeAllRanges(); sel.addRange(range);
  let ok = false;
  document.addEventListener('copy', handler, true);
  try { ok = document.execCommand('copy'); } catch(e){ ok = false; }
  document.removeEventListener('copy', handler, true);
  sel.removeAllRanges(); saved.forEach(r => sel.addRange(r));
  document.body.removeChild(dummy);
  return ok;
}
async function copyFormatted(el, ev, scope){
  ev.stopPropagation(); ev.preventDefault();
  let parents = [], heading = '';
  if (scope === 'grp'){
    const grp = el.closest('details.grp');
    if (!grp) return;
    parents = [...grp.querySelectorAll('.parent')];
    heading = grp.dataset.label || grp.dataset.area || '';
  } else {
    const p = el.closest('.parent');
    if (p) parents = [p];
  }
  if (!parents.length){ toast('nichts zu kopieren'); return; }
  let html = '', text = '';
  if (scope === 'grp' && heading){
    html += '<p><b>ToDos \u00b7 ' + wesc(heading) + '</b></p>';
    text += 'ToDos \u00b7 ' + heading + '\n';
  }
  parents.forEach((p, i) => {
    html += (i ? '<hr>' : '') + parentToHtml(p);
    text += (i ? '\n\n\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\n' : '') + parentToText(p);
  });
  if (writeRichClipboard(html, text)){ toast('kopiert'); return; }
  // Fallback (z.B. mobil / falls execCommand scheitert): Async-Clipboard-API
  try {
    if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write){
      const item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      await navigator.clipboard.write([item]);
    } else if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    } else {
      toast('Kopieren fehlgeschlagen'); return;
    }
    toast('kopiert');
  } catch(e){ toast('Kopieren fehlgeschlagen'); }
}
function reflectEdit(d, ch){
  document.querySelectorAll('[data-id]').forEach(r => {
    if (r.dataset.area !== d.area || r.dataset.id !== d.id) return;
    if ('text' in ch){
      r.dataset.text = ch.text;
      // Identitaet = Text: nach dem Umbenennen MUSS data-id mitwandern, sonst zielt ein
      // Folge-Edit (z.B. Notiz nachtragen) auf die alte id -> Server 'nicht gefunden'.
      // Bei Unteraufgaben bleibt der 'Eltern › '-Praefix erhalten (id endet auf data-text).
      r.dataset.id = d.id.slice(0, d.id.length - d.text.length) + ch.text;
      const t = r.querySelector('.txt');
      if (t){
        const icon = t.querySelector('svg');
        t.textContent = '';
        if (icon){ t.appendChild(icon); t.appendChild(document.createTextNode(' ')); }
        t.appendChild(document.createTextNode(ch.text));
      }
    }
    // Fokus-Karten haben einen .meta-Wrapper; Struktur-Zeilen (.item) nicht -> dann an .txt ankern.
    // Badge-HTML spiegelt render.py _prio_badge/_due_badge; bei \u00c4nderung dort hier mitziehen.
    const meta = r.querySelector('.meta');
    const txt = r.querySelector('.txt');
    if ('prio' in ch){
      r.dataset.prio = ch.prio;
      const old = (meta || r).querySelector('.pri'); if (old) old.remove();
      if (ch.prio){
        const html = prioBadgeHtml(ch.prio);
        if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('due' in ch){
      r.dataset.due = ch.due;
      const old = (meta || r).querySelector('.due'); if (old) old.remove();
      if (ch.due){
        const html = dueBadgeHtml(ch.due);
        const pri = (meta || r).querySelector('.pri');
        if (pri) pri.insertAdjacentHTML('afterend', html);
        else if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('note' in ch){
      r.dataset.note = JSON.stringify(ch.note);
    }
    r.classList.add('edited');
  });
}

function relTime(iso){
  if (!iso) return null;
  const t = Date.parse(iso); if (isNaN(t)) return null;
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'gerade eben';
  if (s < 3600) return 'vor ' + Math.floor(s/60) + ' Min';
  if (s < 86400) return 'vor ' + Math.floor(s/3600) + ' Std';
  const dd = new Date(t);
  return 'am ' + pad2(dd.getDate()) + '.' + pad2(dd.getMonth()+1) + '. ' + pad2(dd.getHours()) + ':' + pad2(dd.getMinutes());
}
function pendingSummary(){

  // n = einzelne wartende Aenderungen, stale = aelteste Sendung > 15 Min unbestaetigt.
  const subs = Object.values(loadPending());
  const n = subs.reduce((a,e)=> { const sub = e.sub; return a + ((e.sub.adds||[]).length + (e.sub.edits||[]).length + (e.sub.done||[]).length + (e.sub.reopen||[]).length + (e.sub.attachments||[]).length + (sub.attdels||[]).length + (sub.delete||[]).length); }, 0);
  const oldest = subs.reduce((a,e)=> Math.min(a, e.sentAt || Date.now()), Date.now());

}

const ATT_MAX_IMG = 8 * 1024 * 1024, ATT_MAX_PDF = 10 * 1024 * 1024;
const ATT_XLSX = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
const ATT_XLS = 'application/vnd.ms-excel';
const ATT_MIME = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf', ATT_XLSX, ATT_XLS];
// Endung -> MIME: die Browser-Angabe file.type ist bei .xlsx haeufig leer, daher
// gewinnt die Endung (synchron zu attachments._EXT_MIME im Backend).
const ATT_EXT_MIME = { '.jpg':'image/jpeg', '.jpeg':'image/jpeg', '.png':'image/png',
  '.webp':'image/webp', '.pdf':'application/pdf', '.xlsx':ATT_XLSX, '.xls':ATT_XLS };
function attExtMime(name){
  const m = String(name || '').toLowerCase().match(/\.[^.]+$/);
  return (m && ATT_EXT_MIME[m[0]]) || '';
}
function attCheck(mime, size){
  if (ATT_MIME.indexOf(mime) < 0) return 'Dateityp nicht unterst\u00fctzt';
  const isImg = mime.startsWith('image/');
  if (size > (isImg ? ATT_MAX_IMG : ATT_MAX_PDF))
    return isImg ? 'Bild zu gro\u00df (max. 8 MB)' : 'Datei zu gro\u00df (max. 10 MB)';
  return null;
}
async function shrinkImage(file){
  if (!file.type.startsWith('image/') || !window.createImageBitmap) return file;
  try {
    const bmp = await createImageBitmap(file);
    const k = Math.min(1, 2000 / Math.max(bmp.width, bmp.height));
    if (k >= 1) return file;
    const c = document.createElement('canvas');
    c.width = Math.round(bmp.width * k); c.height = Math.round(bmp.height * k);
    c.getContext('2d').drawImage(bmp, 0, 0, c.width, c.height);
    const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
    return blob || file;
  } catch(e){ return file; }
}

async function addAttachment(input){

function b64bytes(buf){
  // Gechunkt: Spread/apply ueber Megabyte-Puffer sprengt den Call-Stack
  // ("Maximum call stack size exceeded") -- Anhang-Ciphertexte sind gross.
  const u = new Uint8Array(buf); let s = '';
  for (let i = 0; i < u.length; i += 32768) s += String.fromCharCode.apply(null, u.subarray(i, i + 32768));
  return btoa(s);
}
async function encryptForInbox(obj, pin){
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:250000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt']);
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
  return { salt:b64bytes(salt), iv:b64bytes(iv), ct:b64bytes(ct), iter:250000 };
}
async function sendInbox(submission){
  const payload = await encryptForInbox(submission, PIN);

    method:'POST',
    headers:{ 'Authorization':'Bearer ' + INBOX.secret, 'Content-Type':'application/json' },
    body: JSON.stringify(payload),
  });

}
const QKEY = 'inboxQueue';
function loadQ(){ try { return JSON.parse(localStorage.getItem(QKEY) || '[]'); } catch(e){ return []; } }
function saveQ(q){ localStorage.setItem(QKEY, JSON.stringify(q)); }
function enqueue(sub){ const q = loadQ(); q.push(sub); saveQ(q); }
const ATT_Q_LIMIT = 20 * 1024 * 1024;
function idbOpen(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('todoAttQueue', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('q', { keyPath: 'id' });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbReq(req){ return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); }); }
async function idbAll(){

    return await idbReq(db.transaction('q').objectStore('q').getAll()); }
  catch(e){ return []; }
}
async function idbPut(sub){
  try {
    const all = await idbAll();
    const used = all.reduce((n, s) => n + JSON.stringify(s).length, 0);
    if (used + JSON.stringify(sub).length > ATT_Q_LIMIT) return false;
    const db = await idbOpen();
    await idbReq(db.transaction('q', 'readwrite').objectStore('q').put(sub));
    return true;
  } catch(e){ return false; }
}
async function idbDel(id){
  try { const db = await idbOpen();
    await idbReq(db.transaction('q', 'readwrite').objectStore('q').delete(id)); }

async function flushAttQueue(){
