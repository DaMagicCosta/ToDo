<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ToDo</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',system-ui,sans-serif; background:#0f1117; color:#e6e9ef; }
  header { padding:16px 24px 6px; }
  header h1 { margin:0; font-size:18px; }
  .gate { max-width:320px; margin:18vh auto 0; padding:0 24px; text-align:center; }
  .gate h1 { font-size:22px; margin:0 0 16px; }
  .gate input { width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid #232733; background:#161922; color:#e6e9ef; }
  .gate button[type="submit"] { margin-top:10px; width:100%; padding:11px; border:0; border-radius:8px; background:#2dd4bf; color:#06231f; font-weight:600; cursor:pointer; }
  .gate .err { color:#f87171; font-size:13px; margin-top:10px; min-height:18px; }
  .gate form { margin:0; }
  .pinwrap { position:relative; }
  #pin { padding-right:44px; }
  .reveal { position:absolute; right:4px; top:50%; transform:translateY(-50%); width:auto; margin:0; padding:9px 12px; line-height:1; background:transparent; border:0; color:#9aa4b2; font-size:18px; cursor:pointer; }
  .ic { width:1em; height:1em; display:inline-block; vertical-align:-0.15em; } /* Zwilling in render.py _FRAGMENT_CSS */
  .gate input.userhide { position:absolute; width:1px; height:1px; padding:0; margin:-1px; border:0; opacity:0; pointer-events:none; }
  #app { display:none; }
  html, body { overscroll-behavior-y: contain; }
  #pull { height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:#2dd4bf; font-size:13px; transition:height .12s ease; }
  .toolbar { position:fixed; bottom:0; left:0; right:0; display:flex; gap:8px; padding:10px 16px; background:#0f1117; border-top:1px solid #232733; }
  .toolbar button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; }
  .btn-refresh { background:#1f2937; color:#e6e9ef; }
  .btn-copy { background:#2dd4bf; color:#06231f; }
  #toast { position:fixed; bottom:64px; left:50%; transform:translateX(-50%); background:#232733; color:#e6e9ef; padding:8px 14px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; }
  #toast.show { opacity:1; }
  #fallback { display:none; padding:12px 16px; }
  #fallback textarea { width:100%; height:120px; background:#161922; color:#e6e9ef; border:1px solid #232733; border-radius:8px; }
  #editor { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box { width:100%; max-width:360px; background:#161922; border:1px solid #232733; border-radius:12px; padding:16px; }
  .ed-box h3 { margin:0 0 10px; font-size:16px; }
  .ed-lab { display:block; font-size:11px; color:#9aa4b2; margin:10px 0 4px; }
  .ed-box input[type=text], .ed-box input[type=date] { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid #232733; background:#0f1117; color:#e6e9ef; }
  .ed-box textarea { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid #232733; background:#0f1117; color:#e6e9ef; resize:vertical; font-family:inherit; }
  #ed-note, #nw-note { min-height:100px; }
  #ed-prio { display:flex; gap:6px; }
  #ed-prio .pbtn { flex:1; padding:8px 0; border:1px solid #232733; border-radius:8px; background:#0f1117; color:#9aa4b2; font-size:13px; }
  #ed-prio .pbtn.sel { background:#2dd4bf; color:#06231f; border-color:#2dd4bf; font-weight:600; }
  .ed-row { display:flex; gap:6px; align-items:center; }
  .ed-row button { padding:8px 12px; border:1px solid #232733; border-radius:8px; background:#0f1117; color:#9aa4b2; }
  .ed-actions { display:flex; gap:8px; margin-top:14px; }
  .ed-actions button { flex:1; padding:11px; border:0; border-radius:8px; font-weight:600; }
  .ed-cancel { background:#1f2937; color:#e6e9ef; }
  .ed-ok { background:#2dd4bf; color:#06231f; }
  .ed-box-note { max-height:88vh; overflow:auto; }
  #nt-note { min-height:160px; }
  .ed-box textarea.mdfield { max-height:50vh; resize:none; }
  .mdbar { display:flex; gap:6px; margin-bottom:8px; }
  .mdbar button { flex:1; padding:9px 0; border:1px solid #232733; border-radius:8px; background:#0f1117; color:#9aa4b2; font-size:13px; cursor:pointer; }
  .mdbar button:active { background:#1f2937; }
  .mdprev-lab { font-size:11px; color:#7aa2a9; margin:10px 0 4px; }
  div.mdprev { margin:0; min-height:40px; }
  .mdprev-empty { color:#6b7280; }
  #filterbar { display:flex; align-items:center; gap:8px; padding:8px 16px 0; }
  #searchbar { padding:8px 16px 0; }
  #q { width:100%; padding:8px 10px; font-size:14px; border-radius:8px; border:1px solid #232733; background:#0f1117; color:#e6e9ef; }
  .nomatch { display:none !important; }
  mark.shl { background:#3b3a16; color:#fde68a; border-radius:2px; padding:0 1px; }
  #content [data-id] { cursor:pointer; }
  #ed-log { display:flex; flex-direction:column; gap:3px; margin:4px 0; }
  .ed-logitem { font-size:13px; color:#cdd3df; padding:3px 9px; background:#0f1117; border:1px solid #232733; border-radius:7px; }
  #ed-logadd { flex:1; }
  #ed-subs { display:flex; flex-direction:column; gap:3px; margin:4px 0; }
  .ed-subitem { font-size:13px; color:#cdd3df; padding:3px 9px; background:#0f1117; border:1px solid #232733; border-radius:7px; }
  #ed-subadd { flex:1; }
  #fab { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:#2dd4bf; color:#06231f; font-size:26px; font-weight:700; line-height:1; padding:0; display:flex; align-items:center; justify-content:center; border:3px solid #0f1117; box-shadow:0 2px 10px rgba(0,0,0,.5); cursor:pointer; z-index:2; }
  .seg { display:flex; background:#161922; border:1px solid #232733; border-radius:8px; overflow:hidden; }
  .seg button { padding:6px 12px; border:0; background:transparent; color:#9aa4b2; font-size:13px; cursor:pointer; }
  .seg button.sel { background:#2dd4bf; color:#06231f; font-weight:600; }
  .newbtn { margin-left:auto; padding:6px 12px; border:1px solid #2dd4bf; border-radius:8px; background:transparent; color:#2dd4bf; font-size:13px; font-weight:600; cursor:pointer; }
  body.f-arbeit [data-notebook="Privat"] { display:none; }
  body.f-privat [data-notebook="Arbeit"] { display:none; }
  #newdlg, #notedlg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); align-items:center; justify-content:center; z-index:20; padding:16px; }
  .ed-box select { width:100%; padding:9px 10px; font-size:15px; border-radius:8px; border:1px solid #232733; background:#0f1117; color:#e6e9ef; }
  #nw-prio { display:flex; gap:6px; }
  #nw-prio .pbtn { flex:1; padding:8px 0; border:1px solid #232733; border-radius:8px; background:#0f1117; color:#9aa4b2; font-size:13px; }
  #nw-prio .pbtn.sel { background:#2dd4bf; color:#06231f; border-color:#2dd4bf; font-weight:600; }
  #printhead { display:none; }
  @media (min-width:900px){
    body.unlocked #app { margin-right:42%; }
    body.unlocked .toolbar { right:42%; }
    body.unlocked:not(.newmode) #editor { display:block !important; position:fixed; inset:0 0 0 auto; width:42%; background:#0f1117; border-left:1px solid #232733; padding:20px 22px 80px; overflow:auto; align-items:initial; justify-content:initial; }
    body.unlocked.newmode #newdlg { display:block !important; position:fixed; inset:0 0 0 auto; width:42%; background:#0f1117; border-left:1px solid #232733; padding:20px 22px 80px; overflow:auto; align-items:initial; justify-content:initial; }
    body.unlocked.newmode #newdlg .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    #editor .ed-box { max-width:none; border:0; background:transparent; padding:0; }
    #editor .ed-actions { display:none; }
    #content [data-id].selected { outline:2px solid #2dd4bf; outline-offset:-2px; border-radius:8px; }
  }
  @media print {
    body { background:#fff; color:#000; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .gate, #pull, #filterbar, #searchbar, .toolbar, .tabs, #editor, #newdlg, #notedlg, #fallback, #toast, .noteico, .donewrap, .delsec, .grpprint { display:none !important; }
    body.print-section .grp:not(.printtarget) { display:none !important; }
    #printhead { display:flex; justify-content:space-between; font-weight:600; border-bottom:1px solid #000; padding-bottom:6px; margin-bottom:12px; }
    .pane { padding:0; max-width:none; }
    .pane h4 { color:#000; }
    .focuscard, .item, .item.sub, .grp { background:#fff !important; color:#000 !important; border-color:#bbb !important; }
    .grp { border:none !important; }
    .focuscard { border:1px solid #ccc !important; }
    .focuscard.hi { border-left:3px solid #f87171 !important; }
    .focuscard.sixt { border-left:3px solid #fbbf24 !important; }
    .focuscard.overdue { border-left:4px solid #f87171 !important; }
    summary.grp-title, summary.grp-title span, .txt, .area, .due, .prog, .note, .note * { color:#000 !important; }
    .due.soon { color:#c0392b !important; }
    .note { border-left:2px solid #999 !important; }
    .pri { background:#fff !important; border:1px solid currentColor !important; }
    .p-hi { color:#c0392b !important; }
    .p-mid { color:#b7791f !important; }
    .p-lo { color:#0f766e !important; }
    .focuscard, .parent, .grp { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <h1><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M128,112a28,28,0,0,0-8,54.83V184a8,8,0,0,0,16,0V166.83A28,28,0,0,0,128,112Zm0,40a12,12,0,1,1,12-12A12,12,0,0,1,128,152Zm80-72H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"/></svg> ToDo</h1>
  <form id="gateform" onsubmit="unlock(); return false">
    <input type="text" id="pinuser" name="username" autocomplete="username" value="todo" readonly class="userhide" tabindex="-1" aria-hidden="true">
    <div class="pinwrap">
      <input id="pin" name="password" type="password" placeholder="PIN" autocomplete="current-password" autofocus>
      <button type="button" class="reveal" onclick="togglePin()" aria-label="Passwort anzeigen"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.34c18.83-18.83,27.3-37.61,27.65-38.4A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231.05,128C223.84,141.46,192.43,192,128,192Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"/></svg></button>
    </div>
    <button type="submit">Entsperren</button>
  </form>
  <div class="err" id="err"></div>
</div>
<div id="app">
  <div id="pull"></div>
  <div id="filterbar">
    <div class="seg" id="seg">
      <button data-f="" onclick="setFilter(this)">Alle</button>
      <button data-f="arbeit" onclick="setFilter(this)">Arbeit</button>
      <button data-f="privat" onclick="setFilter(this)">Privat</button>
    </div>
    <button class="newbtn" onclick="printNow()" aria-label="Drucken"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M214.67,72H200V40a8,8,0,0,0-8-8H64a8,8,0,0,0-8,8V72H41.33C27.36,72,16,82.77,16,96v80a8,8,0,0,0,8,8H56v32a8,8,0,0,0,8,8H192a8,8,0,0,0,8-8V184h32a8,8,0,0,0,8-8V96C240,82.77,228.64,72,214.67,72ZM72,48H184V72H72ZM184,208H72V160H184Zm40-40H200V152a8,8,0,0,0-8-8H64a8,8,0,0,0-8,8v16H32V96c0-4.41,4.19-8,9.33-8H214.67c5.14,0,9.33,3.59,9.33,8Zm-24-52a12,12,0,1,1-12-12A12,12,0,0,1,200,116Z"/></svg></button>
  </div>
  <div id="searchbar"><input id="q" type="search" placeholder="Suche…" autocomplete="off" oninput="listSearch(this.value)"></div>
  <div id="printhead"></div>
  <main id="content"></main>
  <div id="fallback"><p>Manuell kopieren:</p><textarea id="fallbackText" readonly></textarea></div>
  <div class="toolbar">
    <button class="btn-refresh" onclick="refresh()"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M224,48V96a8,8,0,0,1-8,8H168a8,8,0,0,1,0-16h28.69L182.06,73.37a79.56,79.56,0,0,0-56.13-23.43h-.45A79.52,79.52,0,0,0,69.59,72.71,8,8,0,0,1,58.41,61.27a96,96,0,0,1,135,.79L208,76.69V48a8,8,0,0,1,16,0ZM186.41,183.29a80,80,0,0,1-112.47-.66L59.31,168H88a8,8,0,0,0,0-16H40a8,8,0,0,0-8,8v48a8,8,0,0,0,16,0V179.31l14.63,14.63A95.43,95.43,0,0,0,130,222.06h.53a95.36,95.36,0,0,0,67.07-27.33,8,8,0,0,0-11.18-11.44Z"/></svg> Aktualisieren</button>
    <button class="btn-copy" onclick="submitChanges()"><svg class="ic" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/></svg> Senden</button>
    <button id="fab" onclick="openNew()" aria-label="Neues ToDo">+</button>
  </div>
</div>
<div id="editor" onclick="if(event.target===this&&!isWide())applyEdit()">
  <div class="ed-box ed-box-note">
    <h3>ToDo bearbeiten</h3>
    <label class="ed-lab">Text</label>
    <input id="ed-text" type="text" list="dl-texts" autocomplete="off">
    <label class="ed-lab">Priorität</label>
    <div id="ed-prio">
      <button class="pbtn" data-v="hoch" onclick="pickPrio(this)">Hoch</button>
      <button class="pbtn" data-v="mittel" onclick="pickPrio(this)">Mittel</button>
      <button class="pbtn" data-v="niedrig" onclick="pickPrio(this)">Niedrig</button>
      <button class="pbtn" data-v="" onclick="pickPrio(this)">keine</button>
    </div>
    <label class="ed-lab">Fälligkeit</label>
    <div class="ed-row"><input id="ed-due" type="date"><button onclick="clearDue()">keine</button></div>
    <label class="ed-lab"><input id="ed-familie" type="checkbox" style="width:auto"> Familie</label>
    <label class="ed-lab"><input id="ed-frau" type="checkbox" style="width:auto"> Frau</label>
    <label class="ed-lab"><input id="ed-sixt" type="checkbox" style="width:auto"> Chef</label>
    <label class="ed-lab">Notiz</label>
    <div class="mdbar"><button type="button" onclick="mdLinePrefix('ed-note','- ')">&#8226; Liste</button><button type="button" onclick="mdWrap('ed-note','**','**')">Fett</button><button type="button" onclick="mdWrap('ed-note','*','*')">Kursiv</button><button type="button" onclick="mdLinePrefix('ed-note','# ', true)"># Titel</button></div><textarea id="ed-note" class="mdfield" oninput="noteSync('ed-note')"></textarea><div class="mdprev-lab">Vorschau</div><div id="ed-preview" class="note mdprev"></div>
    <div id="ed-logwrap"><label class="ed-lab">Verlauf</label>
      <div class="ed-row"><input id="ed-logadd" type="text" placeholder="Neuer Eintrag&#8230;" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();addLog();}"><button onclick="addLog()">+</button></div>
      <div id="ed-log"></div>
    </div>
    <div id="ed-subwrap"><label class="ed-lab">Unteraufgaben</label>
      <div id="ed-subs"></div>
      <div class="ed-row"><input id="ed-subadd" type="text" placeholder="Neue Unteraufgabe&#8230;" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask();}"><button onclick="addSubtask()">+</button></div>
    </div>
    <div class="ed-actions"><button class="ed-cancel" onclick="closeEditor()">Abbrechen</button><button class="ed-ok" onclick="applyEdit()">Speichern</button></div>
  </div>
</div>
<div id="newdlg">
  <div class="ed-box ed-box-note">
    <h3>Neues ToDo</h3>
    <label class="ed-lab">Text</label>
    <input id="nw-text" type="text" list="dl-texts" autocomplete="off">
    <label class="ed-lab">Notizbuch</label>
    <div id="nw-nb" class="seg">
      <button data-v="Arbeit" onclick="pickNb(this)">Arbeit</button>
      <button data-v="Privat" onclick="pickNb(this)">Privat</button>
    </div>
    <label class="ed-lab">Bereich</label>
    <select id="nw-area" onchange="onAreaChange()"></select>
    <input id="nw-newsec" type="text" list="dl-areas" autocomplete="off" placeholder="Neuer Abschnitt" style="display:none;margin-top:6px">
    <label class="ed-lab">Priorit&#228;t</label>
    <div id="nw-prio">
      <button class="pbtn" data-v="hoch" onclick="pickNewPrio(this)">Hoch</button>
      <button class="pbtn" data-v="mittel" onclick="pickNewPrio(this)">Mittel</button>
      <button class="pbtn" data-v="niedrig" onclick="pickNewPrio(this)">Niedrig</button>
      <button class="pbtn sel" data-v="" onclick="pickNewPrio(this)">keine</button>
    </div>
    <label class="ed-lab">F&#228;lligkeit</label>
    <div class="ed-row"><input id="nw-due" type="date"><button onclick="document.getElementById('nw-due').value=''">keine</button></div>
    <label class="ed-lab"><input id="nw-familie" type="checkbox" style="width:auto"> Familie</label>
    <label class="ed-lab"><input id="nw-frau" type="checkbox" style="width:auto"> Frau</label>
    <label class="ed-lab"><input id="nw-sixt" type="checkbox" style="width:auto"> Chef</label>
    <label class="ed-lab">Notiz</label>
    <div class="mdbar"><button type="button" onclick="mdLinePrefix('nw-note','- ')">&#8226; Liste</button><button type="button" onclick="mdWrap('nw-note','**','**')">Fett</button><button type="button" onclick="mdWrap('nw-note','*','*')">Kursiv</button><button type="button" onclick="mdLinePrefix('nw-note','# ', true)"># Titel</button></div><textarea id="nw-note" class="mdfield" oninput="noteSync('nw-note')"></textarea><div class="mdprev-lab">Vorschau</div><div id="nw-preview" class="note mdprev"></div>
    <div class="ed-actions"><button class="ed-cancel" onclick="closeNew()">Abbrechen</button><button class="ed-ok" onclick="saveNew()">Anlegen</button></div>
  </div>
</div>
<div id="notedlg">
  <div class="ed-box ed-box-note">
    <h3>Notiz</h3>
    <div class="mdbar"><button type="button" onclick="mdLinePrefix('nt-note','- ')">&#8226; Liste</button><button type="button" onclick="mdWrap('nt-note','**','**')">Fett</button><button type="button" onclick="mdWrap('nt-note','*','*')">Kursiv</button><button type="button" onclick="mdLinePrefix('nt-note','# ', true)"># Titel</button></div><textarea id="nt-note" class="mdfield" oninput="noteSync('nt-note')" placeholder="Notiz (Markdown m&#246;glich: - Liste, **fett**, # Titel)"></textarea><div class="mdprev-lab">Vorschau</div><div id="nt-preview" class="note mdprev"></div>
    <div class="ed-actions"><button class="ed-cancel" onclick="closeNote()">Abbrechen</button><button class="ed-ok" onclick="saveNote()">Speichern</button></div>
  </div>
</div>
<div id="toast"></div>
<datalist id="dl-texts"></datalist>
<datalist id="dl-areas"></datalist>
<script>

function parseEnvelope(s){
  try { const e = JSON.parse(s); if (e && typeof e.html === 'string') return e; } catch(_){}
  return { html: s, inbox: null };
}
function b64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

function listSearch(q){
  q = (q || '').trim().toLowerCase();
  const content = document.getElementById('content');
  if (!content) return;
  const match = el => !q || (el.dataset.text || '').toLowerCase().includes(q);
  // Struktur: einzelne Karten aus-/einblenden
  content.querySelectorAll('details.grp [data-text]').forEach(r => r.classList.toggle('nomatch', !match(r)));
  // Fokus: Eltern-Einheit als Ganzes (sichtbar, wenn irgendein ToDo darin passt)
  content.querySelectorAll('.focusparent').forEach(p => {
    const hit = !q || [...p.querySelectorAll('[data-text]')].some(match);
    p.classList.toggle('nomatch', !hit);
  });
  // Leere Struktur-Gruppen ausblenden
  content.querySelectorAll('details.grp').forEach(g => {
    const hit = !q || g.querySelector('[data-text]:not(.nomatch)');
    g.classList.toggle('nomatch', !hit);
  });
  highlightMatches(content, q);
}
function highlightMatches(content, q){
  // alte Markierungen entfernen
  content.querySelectorAll('mark.shl').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  content.querySelectorAll('.txt').forEach(t => t.normalize());
  if (!q) return;
  content.querySelectorAll('[data-text]:not(.nomatch) .txt').forEach(txt => {
    [...txt.childNodes].forEach(node => {
      if (node.nodeType !== 3) return;
      const s = node.nodeValue, low = s.toLowerCase();
      let i = low.indexOf(q);
      if (i < 0) return;
      const frag = document.createDocumentFragment();
      let last = 0;
      while (i >= 0){
        frag.appendChild(document.createTextNode(s.slice(last, i)));
        const m = document.createElement('mark');
        m.className = 'shl';
        m.textContent = s.slice(i, i + q.length);
        frag.appendChild(m);
        last = i + q.length;
        i = low.indexOf(q, last);
      }
      frag.appendChild(document.createTextNode(s.slice(last)));
      node.replaceWith(frag);
    });
  });
}

async function ensureWiki(){
  if (WIKI) return true;
  if (_wikiLoad) return _wikiLoad;
  const body = document.getElementById('wikibody');
  body.innerHTML = '<p class="wmsg">Wiki wird geladen\u2026</p>';
  _wikiLoad = (async () => {
    try {
      let raw, offline = false;
      try {
        const r = await fetch('wiki.enc.json?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) throw new Error('fetch');
        raw = await r.json();
        cacheBlob('encWiki', raw);
      } catch(netErr) {
        raw = loadBlob('encWiki');
        if (!raw) throw netErr;
        offline = true;
      }
      const arr = JSON.parse(await decryptPayload(raw, PIN));
      WIKI = {};
      arr.forEach(n => { WIKI[n.key] = n; });
      if (offline) toast('offline \u2013 letzter Stand');
      return true;
    } catch(e) {
      WIKI = null;
      body.innerHTML = '<p class="wmsg">Wiki konnte nicht geladen werden. '
        + '<button class="wretry" onclick="openWiki()">Erneut versuchen</button></p>';
      return false;
    } finally {
      _wikiLoad = null;
    }
  })();
  return _wikiLoad;
}

function cacheBlob(key, obj){ try { localStorage.setItem(key, JSON.stringify(obj)); } catch(_){} }
function loadBlob(key){ try { return JSON.parse(localStorage.getItem(key)); } catch(_){ return null; } }
async function fetchPayload(){
  const r = await fetch('todos.enc.json?t=' + Date.now(), { cache:'no-store' });
  if (!r.ok) throw new Error('fetch');
  return await r.json();
}
async function decryptPayload(p, pin){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(p.salt), iterations:p.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(p.iv) }, key, b64(p.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(){
  const pin = document.getElementById('pin').value;
  const err = document.getElementById('err'); err.textContent = '';
  let offline = false;
  try {
    let payload;
    try {
      payload = await fetchPayload();
      cacheBlob('encTodos', payload);
    } catch(netErr) {
      payload = loadBlob('encTodos');
      if (!payload) throw netErr;
      offline = true;
    }
    const env = parseEnvelope(await decryptPayload(payload, pin));
    PIN = pin;
    INBOX = env.inbox || null;
    document.getElementById('content').innerHTML = env.html;
    preselectFirst();
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.body.classList.add('unlocked');
    applyFilter(localStorage.getItem('todoFilter') || '');
    if (offline) toast('offline \u2013 letzter Stand');
    flushQueue();
  } catch (e) {
    err.textContent = 'Falsche PIN oder keine Verbindung';
  }
}

async function refresh(){
  if (PIN === null) return;
  try {
    const payload = await fetchPayload();
    cacheBlob('encTodos', payload);
    const env = parseEnvelope(await decryptPayload(payload, PIN));
    INBOX = env.inbox || INBOX;
    Object.keys(EDITS).forEach(k => delete EDITS[k]);
    document.getElementById('content').innerHTML = env.html;
    const qel = document.getElementById('q'); if (qel) qel.value = '';
    preselectFirst();
    document.getElementById('fallback').style.display = 'none';
    const at = document.querySelector('.tab.active');
    if (at && at.dataset.pane === 'wiki' && WIKI && WIKI_STACK.length) {
      showNote(WIKI_STACK[WIKI_STACK.length - 1], false);
    }

  } catch (e) {

// Pull-to-Refresh: eigene Wisch-Geste -> refresh() (KEIN Reload, bleibt angemeldet)
let pullStartY = null, pullDist = 0;
const PULL_THRESHOLD = 70;
window.addEventListener('touchstart', e => {
  pullStartY = (PIN !== null && window.scrollY <= 0) ? e.touches[0].clientY : null;
  pullDist = 0;
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (pullStartY === null) return;
  pullDist = e.touches[0].clientY - pullStartY;
  const ind = document.getElementById('pull');
  if (pullDist > 0 && window.scrollY <= 0) {
    ind.style.height = Math.min(pullDist, 90) + 'px';
    ind.textContent = pullDist > PULL_THRESHOLD ? '\u2193 Loslassen zum Aktualisieren' : '\u2193 Ziehen zum Aktualisieren';
  } else {
    ind.style.height = '0px';
  }
}, { passive: true });
window.addEventListener('touchend', () => {
  if (pullStartY === null) return;
  document.getElementById('pull').style.height = '0px';
  const trigger = pullDist > PULL_THRESHOLD;
  pullStartY = null; pullDist = 0;
  if (trigger) refresh();
}, { passive: true });

function mdInline(s){

          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>');

function mdPreview(src){

      closeList();
      const n = m[1].length;
      html += '<h' + n + '>' + mdInline(m[2]) + '</h' + n + '>';
    } else if ((m = line.match(/^[-*]\s+(.*)$/))){
      if (!inList){ html += '<ul>'; inList = true; }
      html += '<li>' + mdInline(m[1]) + '</li>';
    } else if (line.trim() === ''){
      closeList();
    } else {
      closeList();
      html += '<p>' + mdInline(line) + '</p>';
    }
  }
  closeList();
  return html;
}
function autoGrow(el){ if (!el) return; el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function noteSync(id){
  const t = document.getElementById(id);
  if (!t) return;
  autoGrow(t);
  const prev = document.getElementById(id.replace('-note','-preview'));
  if (prev) prev.innerHTML = mdPreview(t.value) || '<span class="mdprev-empty">(leer)</span>';
}
function mdWrap(id, before, after){
  const t = document.getElementById(id);
  if (!t) return;
  const s = t.selectionStart, e = t.selectionEnd, v = t.value;
  const sel = v.slice(s, e);
  t.value = v.slice(0, s) + before + sel + after + v.slice(e);
  const pos = s + before.length + sel.length;
  t.focus(); t.setSelectionRange(pos, pos);
  noteSync(id);
}
function mdLinePrefix(id, prefix, oneLine){
  const t = document.getElementById(id);
  if (!t) return;
  const s = t.selectionStart, e = t.selectionEnd, v = t.value;
  const lineStart = v.lastIndexOf('\n', s - 1) + 1;
  let lineEnd = v.indexOf('\n', oneLine ? s : e);
  if (lineEnd === -1) lineEnd = v.length;
  const block = v.slice(lineStart, lineEnd);
  const prefixed = block.split('\n').map(l => prefix + l).join('\n');
  t.value = v.slice(0, lineStart) + prefixed + v.slice(lineEnd);
  const np = lineStart + prefixed.length;
  t.focus(); t.setSelectionRange(np, np);
  noteSync(id);
}
let noteRow = null;
function openNote(el){
  const d = el.closest('[data-id]').dataset;
  noteRow = { notebook:d.notebook, area:d.area, id:d.id, wiki:d.wiki };
  document.getElementById('nt-note').value = JSON.parse(d.note || '""');
  document.getElementById('notedlg').style.display = 'flex';
  noteSync('nt-note');
}
function closeNote(){ document.getElementById('notedlg').style.display = 'none'; noteRow = null; }
async function saveNote(){
  const d = noteRow;
  const op = { notebook:d.notebook, area:d.area, id:d.id, note:document.getElementById('nt-note').value };
  closeNote();
  const ok = await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), edits:[op] });
  toast(ok ? 'Notiz gesendet' : 'offline \u2013 gespeichert');
}
async function saveNew(){
  const text = document.getElementById('nw-text').value.trim();
  if (!text) { toast('Text fehlt'); return; }
  let area = document.getElementById('nw-area').value;
  const sections = [];
  if (area === '__new__') {
    area = document.getElementById('nw-newsec').value.trim();
    if (!area) { toast('Abschnittsname fehlt'); return; }
    sections.push({ op:'add', notebook:nwNotebook, name:area });
  }
  const add = { notebook:nwNotebook, area, text };
  add.created = new Date().toLocaleDateString('sv');
  const prioSel = document.querySelector('#nw-prio .pbtn.sel');
  if (prioSel && prioSel.dataset.v) add.prio = prioSel.dataset.v;
  const due = document.getElementById('nw-due').value;
  if (due) add.due = due;
  if (document.getElementById('nw-sixt').checked) add.sixt = '1';
  if (document.getElementById('nw-familie').checked) add.familie = '1';
  if (document.getElementById('nw-frau').checked) add.frau = '1';
  const nnote = document.getElementById('nw-note').value.trim();
  if (nnote) add.note = nnote;
  const ok = await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), adds:[add], sections });
  closeNew();
  toast(ok ? 'angelegt \u2013 an PC gesendet' : 'offline \u2013 gespeichert');
}
async function delSection(el){
  const d = el.dataset;
  if (!confirm('Abschnitt l\u00f6schen: ' + d.area + '?')) return;
  const ok = await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(),
    sections:[{ op:'delete', notebook:d.notebook, area:d.area }] });
  toast(ok ? 'L\u00f6schen gesendet' : 'offline \u2013 gespeichert');
}
function clearDue(){ document.getElementById('ed-due').value = ''; }
function closeEditor(){ flushLogDraft(); if (isWide()) return; document.getElementById('editor').style.display = 'none'; editRow = null; }
function prioBadgeHtml(p){
  if (!p) return '';
  const c = { hoch:'p-hi', mittel:'p-mid', niedrig:'p-lo' }[p];
  return c ? '<span class="pri ' + c + '">' + p.toUpperCase() + '</span>' : '';
}
function dueBadgeHtml(due){
  if (!due) return '';
  const today = new Date().toISOString().slice(0, 10);
  if (due < today) return '<span class="due soon">\u00fcberf\u00e4llig ' + wesc(due) + '</span>';
  if (due === today) return '<span class="due soon">heute f\u00e4llig</span>';
  return '<span class="due">@' + wesc(due) + '</span>';
}
function reflectEdit(d, ch){
  document.querySelectorAll('[data-id]').forEach(r => {
    if (r.dataset.area !== d.area || r.dataset.id !== d.id) return;
    if ('text' in ch){
      r.dataset.text = ch.text;
      const t = r.querySelector('.txt');
      if (t){
        const icon = t.querySelector('svg');
        t.textContent = '';
        if (icon){ t.appendChild(icon); t.appendChild(document.createTextNode(' ')); }
        t.appendChild(document.createTextNode(ch.text));
      }
    }
    // Fokus-Karten haben einen .meta-Wrapper; Struktur-Zeilen (.item) nicht -> dann an .txt ankern.
    // Badge-HTML spiegelt render.py _prio_badge/_due_badge; bei \u00c4nderung dort hier mitziehen.
    const meta = r.querySelector('.meta');
    const txt = r.querySelector('.txt');
    if ('prio' in ch){
      r.dataset.prio = ch.prio;
      const old = (meta || r).querySelector('.pri'); if (old) old.remove();
      if (ch.prio){
        const html = prioBadgeHtml(ch.prio);
        if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('due' in ch){
      r.dataset.due = ch.due;
      const old = (meta || r).querySelector('.due'); if (old) old.remove();
      if (ch.due){
        const html = dueBadgeHtml(ch.due);
        const pri = (meta || r).querySelector('.pri');
        if (pri) pri.insertAdjacentHTML('afterend', html);
        else if (meta) meta.insertAdjacentHTML('afterbegin', html);
        else if (txt) txt.insertAdjacentHTML('afterend', html);
      }
    }
    if ('note' in ch){
      const _prevEntries = splitNoteLog(JSON.parse(r.dataset.note || '""')).entries;
      r.dataset.note = JSON.stringify(joinNoteLog(ch.note, _prevEntries));
    }
    r.classList.add('edited');
  });
}
function isWide(){ return !!(window.matchMedia && window.matchMedia('(min-width:900px)').matches); }
function markSelected(el){
  const card = el.closest('[data-id]');
  document.querySelectorAll('#content [data-id].selected').forEach(x => x.classList.remove('selected'));
  if (card) card.classList.add('selected');
}
function stageEdit(){
  if (!editRow) return;
  const d = editRow;
  const newText = document.getElementById('ed-text').value.trim();
  const sel = document.querySelector('#ed-prio .pbtn.sel');
  const newPrio = sel ? sel.dataset.v : d.prio;
  const newDue = document.getElementById('ed-due').value;
  const newSixt = document.getElementById('ed-sixt').checked ? '1' : '0';
  const newFamilie = document.getElementById('ed-familie').checked ? '1' : '0';
  const newFrau = document.getElementById('ed-frau').checked ? '1' : '0';
  const newNote = document.getElementById('ed-note').value;
  const ch = { area:d.area, id:d.id, notebook:d.notebook, wiki:d.wiki };
  if (newText && newText !== d.text) ch.text = newText;
  if (newPrio !== d.prio) ch.prio = newPrio;
  if (newDue !== d.due) ch.due = newDue;
  if (newSixt !== d.sixt) ch.sixt = newSixt;
  if (newFamilie !== d.familie) ch.familie = newFamilie;
  if (newFrau !== d.frau) ch.frau = newFrau;
  if (newNote !== d.note) ch.note = newNote;
  if (Object.keys(ch).length > 4) {
    EDITS[d.area + '\u0000' + d.id] = ch;
    reflectEdit(d, ch);
    toast('\u00c4nderung gemerkt');
  }
  const qel = document.getElementById('q'); if (qel && qel.value) listSearch(qel.value);
}
function applyEdit(){ stageEdit(); closeEditor(); }
function preselectFirst(){
  if (!isWide()) return;
  document.body.classList.remove('newmode');   // Detailansicht zeigen, nie im Neu-Modus haengen bleiben
  const first = document.querySelector('#content .pane.active [data-id] .txt');
  if (first) openEdit(first, false);
}
function pad2(n){ return String(n).padStart(2,'0'); }
function localTs(){
  const d = new Date();
  return d.toLocaleDateString('sv') + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function splitNoteLog(note){
  const free = [], entries = [];
  (note || '').split('\n').forEach(line => {
    const m = line.match(/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2})\] (.*)$/);
    if (m) entries.push({ ts: m[1], text: m[2] });
    else free.push(line);
  });
  return { free: free.join('\n'), entries };
}
function joinNoteLog(free, entries){
  const logLines = entries.map(e => '[' + e.ts + '] ' + e.text);
  return [free, ...logLines].filter(s => s !== '').join('\n');
}
function fmtTsDe(ts){
  const [date, time] = ts.split(' ');
  const [y, m, dd] = date.split('-');
  return dd + '.' + m + '.' + y + ' ' + time;
}
function logItemEl(ts, text){
  const el = document.createElement('div');
  el.className = 'ed-logitem';
  el.textContent = fmtTsDe(ts) + '  ' + text;
  return el;
}
async function addLog(){
  if (!editRow) return;
  const inp = document.getElementById('ed-logadd');
  const text = inp.value.trim();
  if (!text) return;
  const ts = localTs();
  const op = { notebook: editRow.notebook, area: editRow.area, id: editRow.id, ts, text };
  document.getElementById('ed-log').appendChild(logItemEl(ts, text));   // optimistisch unten
  // data-note der Karte(n) optimistisch nachziehen, damit Re-open vor Server-Refresh den Eintrag zeigt
  document.querySelectorAll('#content [data-id]').forEach(el => {
    if (el.dataset.area === editRow.area && el.dataset.id === editRow.id) {
      const _s = splitNoteLog(JSON.parse(el.dataset.note || '""'));
      _s.entries.push({ ts, text });
      el.dataset.note = JSON.stringify(joinNoteLog(_s.free, _s.entries));
    }
  });
  inp.value = ''; inp.focus();
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), logs:[op] });
}
function flushLogDraft(){
  const inp = document.getElementById('ed-logadd');
  if (inp && inp.value.trim()) addLog();
}
async function addSubtask(){
  if (!editRow) return;
  const inp = document.getElementById('ed-subadd');
  const text = inp.value.trim();
  if (!text) return;
  const op = { notebook: editRow.notebook, area: editRow.area, parent: editRow.id, text, created: new Date().toLocaleDateString('sv') };
  const item = document.createElement('div');
  item.className = 'ed-subitem';
  item.textContent = text;
  document.getElementById('ed-subs').appendChild(item);   // optimistisch sofort
  inp.value = ''; inp.focus();                          // Feld leeren + Fokus halten
  await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), adds:[op] });
}
// Klick irgendwo auf eine Listen-Karte oeffnet/laedt sie -- nicht nur der Text.
// Interaktive Teile (Checkbox, Notiz-Icon, Klapp-Pfeile, Links/Buttons) bleiben ausgenommen;
// .txt hat seinen eigenen onclick -> hier ausnehmen, damit es nicht doppelt feuert.
document.addEventListener('click', e => {
  if (e.target.closest('.chk, .noteico, summary, a, input, button, .delsec, .grpprint, .txt')) return;
  const card = e.target.closest('#content [data-id]');
  if (card) openEdit(card);
});
function b64bytes(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
async function encryptForInbox(obj, pin){
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:250000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt']);
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
  return { salt:b64bytes(salt), iv:b64bytes(iv), ct:b64bytes(ct), iter:250000 };
}
async function sendInbox(submission){
  const payload = await encryptForInbox(submission, PIN);
  const r = await fetch(INBOX.url + '/inbox', {
    method:'POST',
    headers:{ 'Authorization':'Bearer ' + INBOX.secret, 'Content-Type':'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) throw new Error('inbox ' + r.status);
}
const QKEY = 'inboxQueue';
function loadQ(){ try { return JSON.parse(localStorage.getItem(QKEY) || '[]'); } catch(e){ return []; } }
function saveQ(q){ localStorage.setItem(QKEY, JSON.stringify(q)); }
function enqueue(sub){ const q = loadQ(); q.push(sub); saveQ(q); }
async function flushQueue(){
  if (!INBOX || !INBOX.url) return;
  const q = loadQ(); if (!q.length) return;
  const rest = [];
  for (const sub of q) { try { await sendInbox(sub); } catch(e){ rest.push(sub); } }
  saveQ(rest);
  if (!rest.length) toast('Warteschlange gesendet');
}
async function sendOrQueue(sub){
  try {
    if (!INBOX || !INBOX.url) throw new Error('kein Worker');
    await sendInbox(sub);
    return true;
  } catch(e) { enqueue(sub); return false; }
}
window.addEventListener('online', flushQueue);
async function submitChanges(){
  flushLogDraft();
  stageEdit();
  const done=[], edits=[];
  document.querySelectorAll('#content .chk:checked').forEach(c => {
    const d = c.closest('[data-id]').dataset;
    done.push({ notebook:d.notebook, area:d.area, id:d.id });
  });
  Object.values(EDITS).forEach(e => { const { wiki, ...op } = e; edits.push(op); });
  if (!done.length && !edits.length) { toast('nichts ausstehend'); return; }
  const sent = await sendOrQueue({ id: Date.now() + '_' + crypto.randomUUID(), done, edits });
  // optimistisch: abgehakte Items sofort lokal ausblenden (Fokus + Struktur, via area+id)
  done.forEach(o => {
    document.querySelectorAll('#content [data-id]').forEach(el => {
      if (el.dataset.area === o.area && el.dataset.id === o.id) el.remove();
    });
  });
  Object.keys(EDITS).forEach(k => delete EDITS[k]);
  document.querySelectorAll('.edited').forEach(x => x.classList.remove('edited'));
  toast(sent === true ? 'an PC gesendet' : 'offline \u2013 gespeichert, wird automatisch gesendet');
}
// Enter wird jetzt nativ vom <form id="gateform"> (onsubmit) verarbeitet.
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
